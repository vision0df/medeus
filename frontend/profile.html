<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medeus // Профиль</title>
<link rel="stylesheet" href="global.css">
<style>
  body { display: flex; flex-direction: column; }
  .page { flex:1; padding:88px 52px 64px; max-width:960px; margin:0 auto; width:100%; position:relative; z-index:1; }

  /* ─── TWO-COL GRID ─── */
  .profile-grid { display: grid; grid-template-columns: 260px 1fr; gap: 24px; align-items: start; }

  /* ─── PROFILE CARD ─── */
  .profile-aside-wrap {
    background: var(--text);
    clip-path: polygon(18px 0%,100% 0%,100% calc(100% - 18px),calc(100% - 18px) 100%,0% 100%,0% 18px);
    padding: 2px; position: sticky; top: 80px;
  }
  .profile-aside {
    background: var(--white);
    clip-path: polygon(16px 0%,100% 0%,100% calc(100% - 16px),calc(100% - 16px) 100%,0% 100%,0% 16px);
    padding: 32px 26px; text-align: center;
  }
  .avatar-big {
    width: 80px; height: 80px; margin: 0 auto 18px;
    background: var(--orange); color: #fff;
    font-family: var(--sans); font-size: 28px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    clip-path: polygon(10px 0%,100% 0%,100% calc(100% - 10px),calc(100% - 10px) 100%,0% 100%,0% 10px);
  }
  .profile-name  { font-family: var(--sans); font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
  .profile-email { font-family: var(--mono); font-size: 11px; color: var(--text-dim); word-break: break-all; }

  .profile-aside-divider { height: 1px; background: var(--line); margin: 20px 0; }

  .profile-meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .profile-meta-key { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); }
  .profile-meta-val { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text); }

  /* ─── SECTION CARDS ─── */
  .section-card-wrap {
    background: var(--text);
    clip-path: polygon(18px 0%,100% 0%,100% calc(100% - 18px),calc(100% - 18px) 100%,0% 100%,0% 18px);
    padding: 2px; margin-bottom: 22px; animation: fadeUp 0.35s ease both;
  }
  .section-card-wrap:nth-child(2) { animation-delay:.07s }
  .section-card {
    background: var(--white);
    clip-path: polygon(16px 0%,100% 0%,100% calc(100% - 16px),calc(100% - 16px) 100%,0% 100%,0% 16px);
  }
  .section-card-header {
    padding: 18px 28px 16px; border-bottom: 1px solid var(--line); background: var(--bg2);
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-card-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); display: flex; align-items: center; gap: 7px; }
  .section-card-label::before { content: '/'; color: var(--orange); font-weight: 700; font-size: 13px; }
  .section-card-body { padding: 28px; }

  /* ─── FORM ─── */
  .field-group { display: flex; flex-direction: column; gap: 7px; margin-bottom: 20px; }
  .field-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .field-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .field-label::before { content: '/'; font-weight: 700; }

  .field-input {
    padding: 13px 16px; height: 48px;
    border: 1px solid var(--line-mid); border-left: 3px solid var(--bg3);
    background: var(--bg); font-family: var(--mono); font-size: 13px; color: var(--text);
    outline: none; width: 100%; transition: border-color 0.15s, background 0.15s, border-left-color 0.15s;
    -webkit-appearance: none; appearance: none;
  }
  .field-input:focus { border-color: var(--text); border-left-color: var(--orange); background: var(--white); }
  .field-input::placeholder { color: var(--text-dim); font-size: 12px; }
  .field-input:disabled { color: var(--text-dim); cursor: not-allowed; opacity: 0.65; }
  select.field-input { cursor: pointer; }
  .select-field-wrap { position: relative; }
  .select-field-wrap::after { content: '▼'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 8px; color: var(--text-dim); pointer-events: none; }

  /* ─── ALERT ─── */
  .alert { display: none; padding: 12px 16px; margin-bottom: 18px; font-family: var(--mono); font-size: 12px; }
  .alert.visible { display: block; }
  .alert.error   { background: var(--red-pale); border: 1px solid var(--red-border); color: var(--red); animation: shake 0.35s ease; }
  .alert.success { background: var(--green-pale); border: 1px solid var(--green-border); color: var(--green); }

  /* ─── PASSWORD STRENGTH ─── */
  .pw-strength { margin-top: 8px; }
  .pw-strength-bars { display: flex; gap: 5px; margin-bottom: 4px; }
  .pw-strength-bar { flex: 1; height: 3px; background: var(--bg3); transition: background 0.2s; }
  .pw-strength-bar.weak   { background: var(--red); }
  .pw-strength-bar.medium { background: var(--yellow); }
  .pw-strength-bar.strong { background: var(--green); }
  .pw-strength-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; }

  /* ─── PAGE LOADER ─── */
  .page-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 80px; }
  .page-loader.hidden { display: none; }

  @media (max-width: 820px) {
    .profile-grid { grid-template-columns: 1fr; }
    .profile-aside-wrap { position: static; }
    .field-row { grid-template-columns: 1fr; }
    .page { padding: 78px 28px 52px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="cabinet.html">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2L12 6M12 18L12 22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M2 12L6 12M18 12L22 12M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93"/>
      </svg>
    </div>
    <div class="logo-wordmark">
      <div class="logo-text">Medeus<span>.</span></div>
      <div class="logo-sub">Medical AI</div>
    </div>
  </a>
  <div class="header-right">
    <a href="cabinet.html" class="btn-nav btn-ghost">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Кабинет
    </a>
    <button class="btn-nav btn-danger" id="logoutBtn">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Выйти
    </button>
  </div>
</header>

<main class="page">
  <div class="page-header">
    <div>
      <div class="page-title-label">Аккаунт</div>
      <div class="page-title">Профиль<span class="cursor-blink"></span></div>
    </div>
    <div class="page-meta" id="pageMeta">—</div>
  </div>

  <!-- Page loader -->
  <div class="page-loader" id="pageLoader">
    <div class="loader-px"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="loader-text">Загрузка профиля...</div>
  </div>

  <div id="profileContent" style="display:none">
    <div class="profile-grid">

      <!-- Aside -->
      <div class="profile-aside-wrap">
        <div class="profile-aside">
          <div class="avatar-big" id="avatarBig">—</div>
          <div class="profile-name" id="profileName">—</div>
          <div class="profile-email" id="profileEmail">—</div>
          <div class="profile-aside-divider"></div>
          <div class="profile-meta-row">
            <span class="profile-meta-key">Email</span>
            <span class="profile-meta-val" id="displayEmail">—</span>
          </div>
        </div>
      </div>

      <!-- Main sections -->
      <div>
        <!-- Section 1: Personal data -->
        <div class="section-card-wrap">
          <div class="section-card">
            <div class="section-card-header">
              <div class="section-card-label">Личные данные</div>
            </div>
            <div class="section-card-body">
              <div class="alert" id="alertProfile"><span id="alertProfileText"></span></div>

              <div class="field-group">
                <label class="field-label" for="inputName">Полное имя</label>
                <input class="field-input" type="text" id="inputName" placeholder="Введите имя" autocomplete="name">
              </div>

              <div class="field-row">
                <div class="field-group" style="margin-bottom:0;">
                  <label class="field-label" for="inputBirthDate">Дата рождения</label>
                  <input class="field-input" type="date" id="inputBirthDate" autocomplete="bday">
                </div>
                <div class="field-group" style="margin-bottom:0;">
                  <label class="field-label" for="inputGender">Пол</label>
                  <div class="select-field-wrap">
                    <select class="field-input" id="inputGender">
                      <option value="">— не указан —</option>
                      <option value="мужской">Мужской</option>
                      <option value="женский">Женский</option>
                    </select>
                  </div>
                </div>
              </div>

              <button class="btn-primary" id="btnSaveProfile" style="margin-top:4px;">
                <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                <span>Сохранить данные</span>
              </button>
            </div>
          </div>
        </div>

        <!-- Section 2: Password -->
        <div class="section-card-wrap">
          <div class="section-card">
            <div class="section-card-header">
              <div class="section-card-label">Смена пароля</div>
            </div>
            <div class="section-card-body">
              <div class="alert" id="alertPw"><span id="alertPwText"></span></div>

              <div class="field-group">
                <label class="field-label" for="inputOldPw">Текущий пароль</label>
                <input class="field-input" type="password" id="inputOldPw" placeholder="Введите текущий пароль" autocomplete="current-password">
              </div>
              <div class="field-group">
                <label class="field-label" for="inputNewPw">Новый пароль</label>
                <input class="field-input" type="password" id="inputNewPw" placeholder="Минимум 8 символов" autocomplete="new-password">
                <div class="pw-strength">
                  <div class="pw-strength-bars">
                    <div class="pw-strength-bar" id="pwBar1"></div>
                    <div class="pw-strength-bar" id="pwBar2"></div>
                    <div class="pw-strength-bar" id="pwBar3"></div>
                    <div class="pw-strength-bar" id="pwBar4"></div>
                  </div>
                  <div class="pw-strength-label" id="pwStrengthLabel"></div>
                </div>
              </div>
              <div class="field-group">
                <label class="field-label" for="inputNewPw2">Повторите пароль</label>
                <input class="field-input" type="password" id="inputNewPw2" placeholder="Повторите новый пароль" autocomplete="new-password">
              </div>

              <button class="btn-primary" id="btnSavePw">
                <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                <span>Изменить пароль</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="status-bar">
  <div><span class="status-bar-dot"></span>Аккаунт активен · <span id="statusDate">—</span></div>
  <div class="status-bar-right">Medeus © 2026</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script>
function fmtDate(s){if(!s)return'—';const d=new Date(s+'T00:00:00');return isNaN(d)?s:d.toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'});}
document.getElementById('statusDate').textContent=new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});

function showAlert(id,textId,msg,type){const el=document.getElementById(id);const tx=document.getElementById(textId);if(!el||!tx)return;tx.textContent=msg;el.className='alert visible '+type;if(type==='success')setTimeout(()=>{el.className='alert';},4000);}
function hideAlert(id){const el=document.getElementById(id);if(el)el.className='alert';}

function calcStrength(pw){let s=0;if(pw.length>=8)s++;if(pw.length>=12)s++;if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;return Math.min(s,4);}
document.getElementById('inputNewPw').addEventListener('input',e=>{
  const pw=e.target.value,score=pw?calcStrength(pw):0;
  const cls=score<=1?'weak':score<=2?'medium':'strong';
  const labels=['','Слабый','Слабый','Средний','Надёжный'];
  for(let i=1;i<=4;i++){const b=document.getElementById('pwBar'+i);b.className='pw-strength-bar'+(i<=score?' '+cls:'');}
  document.getElementById('pwStrengthLabel').textContent=pw?labels[score]||'Надёжный':'';
});

let currentSession=null;
async function loadProfile(){
  const session=await requireAuth();if(!session)return;currentSession=session;
  const email=session.user.email||'';
  document.getElementById('avatarBig').textContent=email.slice(0,2).toUpperCase();
  document.getElementById('profileEmail').textContent=email;
  document.getElementById('displayEmail').textContent=email;
  const now=new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'});
  document.getElementById('pageMeta').innerHTML=`Последнее обновление<br>${now}`;
  const client=getSupabase();
  const {data:profile}=await client.from('profiles').select('full_name,gender,birth_date').eq('id',session.user.id).maybeSingle();
  const fullName=profile?.full_name||'',gender=profile?.gender||'',birthDate=profile?.birth_date||'';
  document.getElementById('profileName').textContent=fullName||email.split('@')[0];
  document.getElementById('inputName').value=fullName;
  document.getElementById('inputGender').value=gender;
  document.getElementById('inputBirthDate').value=birthDate;
  document.getElementById('pageLoader').classList.add('hidden');
  document.getElementById('profileContent').style.display='';
}

document.getElementById('btnSaveProfile').addEventListener('click',async()=>{
  const btn=document.getElementById('btnSaveProfile');
  const fullName=document.getElementById('inputName').value.trim();
  const gender=document.getElementById('inputGender').value;
  const birthDate=document.getElementById('inputBirthDate').value;
  hideAlert('alertProfile');
  if(!fullName){showAlert('alertProfile','alertProfileText','Введите имя','error');return;}
  btn.disabled=true;btn.querySelector('span').textContent='Сохранение...';
  try{
    const client=getSupabase();
    const{error}=await client.from('profiles').upsert({id:currentSession.user.id,full_name:fullName,gender:gender||null,birth_date:birthDate||null},{onConflict:'id'});
    if(error)throw error;
    document.getElementById('profileName').textContent=fullName;
    document.getElementById('avatarBig').textContent=fullName.slice(0,2).toUpperCase();
    showAlert('alertProfile','alertProfileText','Данные успешно сохранены','success');
  }catch(e){showAlert('alertProfile','alertProfileText','Ошибка: '+e.message,'error');}
  finally{btn.disabled=false;btn.querySelector('span').textContent='Сохранить данные';}
});

document.getElementById('btnSavePw').addEventListener('click',async()=>{
  const btn=document.getElementById('btnSavePw');
  const oldPw=document.getElementById('inputOldPw').value;
  const newPw=document.getElementById('inputNewPw').value;
  const newPw2=document.getElementById('inputNewPw2').value;
  hideAlert('alertPw');
  if(!oldPw){showAlert('alertPw','alertPwText','Введите текущий пароль','error');return;}
  if(newPw.length<8){showAlert('alertPw','alertPwText','Новый пароль минимум 8 символов','error');return;}
  if(newPw!==newPw2){showAlert('alertPw','alertPwText','Пароли не совпадают','error');return;}
  if(oldPw===newPw){showAlert('alertPw','alertPwText','Новый пароль совпадает с текущим','error');return;}
  btn.disabled=true;
  try{
    const client=getSupabase(),email=currentSession.user.email;
    const{error:se}=await client.auth.signInWithPassword({email,password:oldPw});
    if(se){showAlert('alertPw','alertPwText','Неверный текущий пароль','error');btn.disabled=false;return;}
    const{error:ue}=await client.auth.updateUser({password:newPw});
    if(ue)throw ue;
    ['inputOldPw','inputNewPw','inputNewPw2'].forEach(id=>{document.getElementById(id).value='';});
    for(let i=1;i<=4;i++)document.getElementById('pwBar'+i).className='pw-strength-bar';
    document.getElementById('pwStrengthLabel').textContent='';
    showAlert('alertPw','alertPwText','Пароль успешно изменён','success');
  }catch(e){showAlert('alertPw','alertPwText','Ошибка: '+e.message,'error');}
  finally{btn.disabled=false;}
});

document.getElementById('logoutBtn').addEventListener('click',async e=>{e.preventDefault();await signOut();});
loadProfile();
</script>
</body>
</html>
