<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Medeus // Профиль</title>
  <!-- PWA / iOS Home Screen -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#18150F">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Medeus">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="global.css">
<style>
body { display: flex; flex-direction: column; min-height: 100vh; }

.desk-nav-link {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-mid);
  text-decoration: none; padding: 6px 0; border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
}
.desk-nav-link:hover { color: var(--text); }
.desk-nav-link.active { color: var(--orange); border-bottom-color: var(--orange); }

/* Layout */
.profile-grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
@media (min-width: 768px) { .profile-grid { grid-template-columns: 280px 1fr; } }

/* Aside card */
.aside-card-outer {
  background: var(--text);
  clip-path: polygon(18px 0%, 100% 0%, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0% 100%, 0% 18px);
  padding: 2px; animation: fadeUp .35s ease both;
}
.aside-card {
  background: var(--white);
  clip-path: polygon(16px 0%, 100% 0%, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0% 100%, 0% 16px);
  padding: 28px 24px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 14px;
}
.avatar {
  width: 80px; height: 80px;
  background: var(--orange);
  clip-path: polygon(14px 0%, 100% 0%, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0% 100%, 0% 14px);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--sans); font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -1px;
}
.aside-name  { font-family: var(--sans); font-size: 17px; font-weight: 700; color: var(--text); }
.aside-email { font-family: var(--mono); font-size: 11px; color: var(--text-dim); word-break: break-all; }
.aside-divider { width: 100%; height: 1px; background: var(--line-mid); margin: 4px 0; }
.aside-meta { width: 100%; text-align: left; display: flex; flex-direction: column; gap: 8px; }
.aside-meta-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
.aside-meta-key { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); }
.aside-meta-val { font-family: var(--mono); font-size: 12px; color: var(--text); font-weight: 600; }
.aside-logout {
  width: 100%; padding: 11px 18px; background: var(--bg3); border: none; cursor: pointer;
  font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-mid); display: flex; align-items: center; justify-content: center; gap: 7px;
  clip-path: var(--clip-sm); transition: all .15s; margin-top: 4px;
}
.aside-logout:hover { background: var(--red); color: #fff; }
.aside-logout svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }

/* Section cards */
.section-card-outer {
  background: var(--text);
  clip-path: polygon(18px 0%, 100% 0%, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0% 100%, 0% 18px);
  padding: 2px; margin-bottom: 16px; animation: fadeUp .4s ease both;
}
.section-card-outer:nth-child(2){animation-delay:.07s}
.section-card {
  background: var(--white);
  clip-path: polygon(16px 0%, 100% 0%, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0% 100%, 0% 16px);
}
.section-card-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 22px 12px; border-bottom: 1px solid var(--line); background: var(--bg2);
}
.section-card-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-dim); display: flex; align-items: center; gap: 6px;
}
.section-card-label::before { content: '/'; color: var(--orange); font-weight: 700; font-size: 12px; }
.section-card-body { padding: 24px 22px; }

/* Form */
.field-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.field-row { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 16px; }
@media (min-width: 480px) { .field-row { grid-template-columns: 1fr 1fr; } }
.field-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-dim); display: flex; align-items: center; gap: 5px;
}
.field-label::before { content: '/'; font-weight: 700; }

/* Alert */
.alert { display: none; padding: 11px 14px; margin-bottom: 14px; font-family: var(--mono); font-size: 12px; animation: fadeIn .25s ease; }
.alert.visible { display: block; }
.alert.success { background: var(--green-pale); border: 1px solid var(--green-border); color: var(--green); }
.alert.error   { background: var(--red-pale);   border: 1px solid var(--red-border);   color: var(--red);   animation: shake .35s ease, fadeIn .25s ease; }

/* PW strength */
.pw-strength { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.pw-strength-bars { display: flex; gap: 4px; }
.pw-strength-bar { width: 28px; height: 4px; background: var(--bg3); transition: background .3s; }
.pw-strength-bar.weak   { background: var(--red); }
.pw-strength-bar.medium { background: var(--yellow); }
.pw-strength-bar.strong { background: var(--green); }
.pw-strength-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; }

/* Page loader */
.page-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 80px 20px; }
.page-loader.hidden { display: none; }

.btn-nav-sm {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; background: var(--bg3); border: none; cursor: pointer;
  font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-mid); text-decoration: none; transition: all .15s; clip-path: var(--clip-sm);
}
.btn-nav-sm:hover { background: var(--text); color: #fff; }
</style>
</head>
<body>

<header>
  <a class="logo" href="cabinet.html">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L12 6M12 18L12 22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M2 12L6 12M18 12L22 12M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93" stroke-linecap="round"/></svg>
    </div>
    <div class="logo-wordmark">
      <div class="logo-text">Medeus<span>.</span></div>
      <div class="logo-sub">Medical AI</div>
    </div>
  </a>
  <nav class="header-actions desktop-nav" id="desktopNav" style="display:flex;gap:24px;align-items:center;"></nav>
  <div class="header-actions desktop-nav" style="gap:8px;">
    <button class="btn-nav-sm" id="logoutBtnHeader" style="background:var(--bg3);">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Выйти
    </button>
  </div>
</header>

<nav class="mobile-nav" id="mobileNav"></nav>

<main class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Профиль<span class="cursor-blink"></span></div>
    </div>
    
  </div>

  <div class="page-loader" id="pageLoader">
    <div class="loader-px"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="loader-text">Загрузка профиля...</div>
  </div>

  <div id="profileContent" style="display:none;">
    <div class="profile-grid">

      <!-- Aside -->
      <div>
        <div class="aside-card-outer">
          <div class="aside-card">
            <div class="avatar" id="avatarBig">—</div>
            <div>
              <div class="aside-name" id="profileName">—</div>
              <div class="aside-email" id="profileEmail">—</div>
            </div>
            <div class="aside-divider"></div>
            <div class="aside-meta">
              <div class="aside-meta-row">
                <span class="aside-meta-key">Email</span>
                <span class="aside-meta-val" id="displayEmail">—</span>
              </div>
            </div>
            <button class="aside-logout" id="logoutBtn">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
              Выйти из аккаунта
            </button>
          </div>
        </div>
      </div>

      <!-- Main -->
      <div>

        <!-- Personal -->
        <div class="section-card-outer">
          <div class="section-card">
            <div class="section-card-head">
              <div class="section-card-label">Личные данные</div>
            </div>
            <div class="section-card-body">
              <div class="alert" id="alertProfile"><span id="alertProfileText"></span></div>

              <div class="field-group">
                <label class="field-label" for="inputName">Полное имя</label>
                <input type="text" id="inputName" placeholder="Введите ваше имя" autocomplete="name">
              </div>
              <div class="field-row">
                <div class="field-group" style="margin-bottom:0;">
                  <label class="field-label" for="inputBirthDate">Дата рождения</label>
                  <input type="date" id="inputBirthDate" autocomplete="bday">
                </div>
                <div class="field-group" style="margin-bottom:0;">
                  <label class="field-label" for="inputGender">Пол</label>
                  <div class="select-wrap">
                    <select id="inputGender">
                      <option value="">— не указан —</option>
                      <option value="мужской">Мужской</option>
                      <option value="женский">Женский</option>
                    </select>
                  </div>
                </div>
              </div>

              <button class="btn btn-primary btn-primary-lg btn-full" id="btnSaveProfile" style="margin-top:8px;">
                <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                <span>Сохранить данные</span>
              </button>
            </div>
          </div>
        </div>

        <!-- Password -->
        <div class="section-card-outer">
          <div class="section-card">
            <div class="section-card-head">
              <div class="section-card-label">Смена пароля</div>
            </div>
            <div class="section-card-body">
              <div class="alert" id="alertPw"><span id="alertPwText"></span></div>

              <div class="field-group">
                <label class="field-label" for="inputOldPw">Текущий пароль</label>
                <input type="password" id="inputOldPw" placeholder="Введите текущий пароль" autocomplete="current-password">
              </div>
              <div class="field-group">
                <label class="field-label" for="inputNewPw">Новый пароль</label>
                <input type="password" id="inputNewPw" placeholder="Минимум 8 символов" autocomplete="new-password">
                <div class="pw-strength">
                  <div class="pw-strength-bars">
                    <div class="pw-strength-bar" id="pwBar1"></div>
                    <div class="pw-strength-bar" id="pwBar2"></div>
                    <div class="pw-strength-bar" id="pwBar3"></div>
                    <div class="pw-strength-bar" id="pwBar4"></div>
                  </div>
                  <div class="pw-strength-label" id="pwStrengthLabel"></div>
                </div>
              </div>
              <div class="field-group">
                <label class="field-label" for="inputNewPw2">Повторите пароль</label>
                <input type="password" id="inputNewPw2" placeholder="Повторите новый пароль" autocomplete="new-password">
              </div>

              <button class="btn btn-primary btn-primary-lg btn-full" id="btnSavePw">
                <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                <span>Изменить пароль</span>
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</main>

<div class="status-bar">
  <div><span class="status-dot"></span>Аккаунт активен · <span id="statusDate">—</span></div>
  <div style="color:rgba(255,255,255,.2)">Medeus © 2026</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script>
const PAGES=[
  {id:'cabinet',href:'cabinet.html',label:'Кабинет',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`},
  {id:'upload',href:'upload.html',label:'Анализ',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`},
  {id:'indicators',href:'indicators.html',label:'Данные',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`},
  {id:'profile',href:'profile.html',label:'Профиль',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`},
];
document.getElementById('mobileNav').innerHTML=PAGES.map(p=>`<a href="${p.href}" class="mobile-nav-item${p.id==='profile'?' active':''}">${p.icon}${p.label}</a>`).join('');
document.getElementById('desktopNav').innerHTML=PAGES.map(p=>`<a href="${p.href}" class="desk-nav-link${p.id==='profile'?' active':''}">${p.label}</a>`).join('');

document.getElementById('statusDate').textContent=new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});

function showAlert(id,textId,msg,type){const el=document.getElementById(id);const tx=document.getElementById(textId);if(!el||!tx)return;tx.textContent=msg;el.className='alert visible '+type;if(type==='success')setTimeout(()=>{el.className='alert';},4000);}
function hideAlert(id){const el=document.getElementById(id);if(el)el.className='alert';}

function calcStrength(pw){let s=0;if(pw.length>=8)s++;if(pw.length>=12)s++;if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;return Math.min(s,4);}
document.getElementById('inputNewPw').addEventListener('input',e=>{
  const pw=e.target.value,score=pw?calcStrength(pw):0;
  const cls=score<=1?'weak':score<=2?'medium':'strong';
  const labels=['','Слабый','Слабый','Средний','Надёжный'];
  for(let i=1;i<=4;i++){document.getElementById('pwBar'+i).className='pw-strength-bar'+(i<=score?' '+cls:'');}
  document.getElementById('pwStrengthLabel').textContent=pw?labels[score]||'Надёжный':'';
});

let currentSession=null;
async function loadProfile(){
  const session=await requireAuth();if(!session)return;currentSession=session;
  const email=session.user.email||'';
  document.getElementById('avatarBig').textContent=email.slice(0,2).toUpperCase();
  document.getElementById('profileEmail').textContent=email;
  document.getElementById('displayEmail').textContent=email;
  const _pmEl=document.getElementById('pageMeta');if(_pmEl)_pmEl.innerHTML=`Последнее обновление<br>${new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'})}`;
  const{data:profile}=await getSupabase().from('profiles').select('full_name,gender,birth_date').eq('id',session.user.id).maybeSingle();
  const fullName=profile?.full_name||'',gender=profile?.gender||'',birthDate=profile?.birth_date||'';
  document.getElementById('profileName').textContent=fullName||email.split('@')[0];
  document.getElementById('inputName').value=fullName;
  document.getElementById('inputGender').value=gender;
  document.getElementById('inputBirthDate').value=birthDate;
  document.getElementById('pageLoader').classList.add('hidden');
  document.getElementById('profileContent').style.display='';
}

document.getElementById('btnSaveProfile').addEventListener('click',async()=>{
  const btn=document.getElementById('btnSaveProfile');
  const fullName=document.getElementById('inputName').value.trim();
  const gender=document.getElementById('inputGender').value;
  const birthDate=document.getElementById('inputBirthDate').value;
  hideAlert('alertProfile');
  if(!fullName){showAlert('alertProfile','alertProfileText','Введите имя','error');return;}
  if(!gender){showAlert('alertProfile','alertProfileText','Выберите пол','error');return;}
  if(!birthDate){showAlert('alertProfile','alertProfileText','Укажите дату рождения','error');return;}
  btn.disabled=true;btn.querySelector('span').textContent='Сохранение...';
  try{
    const{error}=await getSupabase().from('profiles').upsert({id:currentSession.user.id,full_name:fullName,gender:gender,birth_date:birthDate},{onConflict:'id'});
    if(error)throw error;
    document.getElementById('profileName').textContent=fullName;
    document.getElementById('avatarBig').textContent=fullName.slice(0,2).toUpperCase();
    showAlert('alertProfile','alertProfileText','Данные успешно сохранены','success');
  }catch(e){showAlert('alertProfile','alertProfileText','Ошибка: '+e.message,'error');}
  finally{btn.disabled=false;btn.querySelector('span').textContent='Сохранить данные';}
});

document.getElementById('btnSavePw').addEventListener('click',async()=>{
  const btn=document.getElementById('btnSavePw');
  const oldPw=document.getElementById('inputOldPw').value;
  const newPw=document.getElementById('inputNewPw').value;
  const newPw2=document.getElementById('inputNewPw2').value;
  hideAlert('alertPw');
  if(!oldPw){showAlert('alertPw','alertPwText','Введите текущий пароль','error');return;}
  if(newPw.length<8){showAlert('alertPw','alertPwText','Новый пароль минимум 8 символов','error');return;}
  if(newPw!==newPw2){showAlert('alertPw','alertPwText','Пароли не совпадают','error');return;}
  if(oldPw===newPw){showAlert('alertPw','alertPwText','Новый пароль совпадает с текущим','error');return;}
  btn.disabled=true;btn.querySelector('span').textContent='Изменяю...';
  try{
    const client=getSupabase(),email=currentSession.user.email;
    const{error:se}=await client.auth.signInWithPassword({email,password:oldPw});
    if(se){showAlert('alertPw','alertPwText','Неверный текущий пароль','error');btn.disabled=false;btn.querySelector('span').textContent='Изменить пароль';return;}
    const{error:ue}=await client.auth.updateUser({password:newPw});
    if(ue)throw ue;
    ['inputOldPw','inputNewPw','inputNewPw2'].forEach(id=>{document.getElementById(id).value='';});
    for(let i=1;i<=4;i++)document.getElementById('pwBar'+i).className='pw-strength-bar';
    document.getElementById('pwStrengthLabel').textContent='';
    showAlert('alertPw','alertPwText','Пароль успешно изменён','success');
  }catch(e){showAlert('alertPw','alertPwText','Ошибка: '+e.message,'error');}
  finally{btn.disabled=false;btn.querySelector('span').textContent='Изменить пароль';}
});

async function logout(){await signOut();}
document.getElementById('logoutBtn').addEventListener('click',logout);
document.getElementById('logoutBtnHeader').addEventListener('click',logout);
loadProfile();
</script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
