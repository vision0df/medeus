<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medeus // Регистрация</title>
<link rel="stylesheet" href="global.css">
<style>
  body { display: flex; flex-direction: column; }

  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 88px 24px 48px; position: relative; z-index: 1;
  }

  .auth-wrap { width: 100%; max-width: 500px; filter: var(--shadow-drop); }
  .auth-outer {
    background: var(--text);
    clip-path: polygon(40px 0%,100% 0%,100% calc(100% - 40px),calc(100% - 40px) 100%,0% 100%,0% 40px);
    padding: 2px;
  }
  .auth-card {
    background: var(--white);
    clip-path: polygon(38px 0%,100% 0%,100% calc(100% - 38px),calc(100% - 38px) 100%,0% 100%,0% 38px);
  }

  .card-header { padding: 30px 38px 26px; border-bottom: 1px solid var(--line); background: var(--bg2); }
  .card-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--orange); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .card-label::before { content: '/'; font-weight: 700; }
  .card-title { font-family: var(--sans); font-size: 24px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 9px; }

  .card-body { padding: 30px 38px 36px; }

  .form-group-reg { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }
  .form-row-reg { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }

  .field-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }
  .field-label::before { content: '/'; font-weight: 700; }
  .field-hint { display: none; font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 3px; }
  .field-hint.ok { display: block; color: var(--green); }
  .field-hint.error { display: block; color: var(--red); }

  .input-wrap { position: relative; display: flex; align-items: center; }
  .input-wrap > .input-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--text-dim); fill: none; pointer-events: none; transition: stroke 0.15s; }
  .input-wrap:focus-within > .input-icon { stroke: var(--orange); }
  input[type="text"], input[type="password"], input[type="email"],
  input[type="date"], input[type="number"], select { padding-left: 44px; }
  .select-wrap { position: relative; }
  .select-wrap::after { content: '▼'; position: absolute; right: 13px; top: 50%; transform: translateY(-50%); font-size: 8px; color: var(--text-dim); pointer-events: none; }
  input.error, select.error { border-color: var(--red); border-left-color: var(--red); }

  .pw-toggle { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 5px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); transition: color 0.15s; z-index: 2; }
  .pw-toggle:hover { color: var(--text); }
  .pw-toggle svg { width: 17px; height: 17px; stroke: currentColor; fill: none; display: block; pointer-events: none; }

  /* Password strength */
  .strength-wrap { display: none; margin-top: 8px; }
  .strength-wrap.show { display: block; }
  .strength-bars { display: flex; gap: 4px; margin-bottom: 4px; }
  .strength-bar { flex: 1; height: 3px; background: var(--bg3); transition: background 0.2s; }
  .strength-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; }

  .auth-error { display: none; padding: 11px 15px; margin-bottom: 16px; background: var(--red-pale); border: 1px solid var(--red-border); color: var(--red); font-family: var(--mono); font-size: 12px; animation: shake 0.35s ease; }
  .auth-error.show { display: block; }

  .btn-reg {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 17px 28px; margin-bottom: 14px;
    background: var(--text); color: #fff;
    border: none; font-family: var(--mono); font-size: 13px; font-weight: 700;
    letter-spacing: 0.09em; text-transform: uppercase; cursor: pointer;
    transition: background 0.18s; line-height: 1;
    clip-path: polygon(11px 0%,100% 0%,100% calc(100% - 11px),calc(100% - 11px) 100%,0% 100%,0% 11px);
  }
  .btn-reg:hover:not(:disabled) { background: var(--orange); }
  .btn-reg:disabled { background: var(--bg4); color: var(--text-dim); cursor: not-allowed; }
  .btn-reg svg { width: 17px; height: 17px; stroke: currentColor; fill: none; flex-shrink: 0; }

  .btn-link-row { text-align: center; font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
  .btn-link-row a { color: var(--orange); text-decoration: none; }
  .btn-link-row a:hover { text-decoration: underline; }

  /* Email sent screen */
  .email-sent { display: none; text-align: center; padding: 8px 0; }
  .email-sent.show { display: block; }
  .email-sent-icon { width: 60px; height: 60px; background: var(--green-pale); border: 1px solid var(--green-border); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  .email-sent-icon svg { width: 28px; height: 28px; stroke: var(--green); fill: none; }
  .email-sent-title { font-family: var(--sans); font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
  .email-sent-desc { font-family: var(--mono); font-size: 12px; color: var(--text-mid); line-height: 1.8; margin-bottom: 24px; }
  .email-sent-addr { font-family: var(--mono); font-weight: 700; color: var(--orange); }

  @media (max-width: 540px) {
    .card-header { padding: 24px 24px 20px; }
    .card-body { padding: 26px 24px 30px; }
    .auth-outer, .auth-card { clip-path: none; }
    .form-row-reg { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2L12 6M12 18L12 22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M2 12L6 12M18 12L22 12M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93"/>
      </svg>
    </div>
    <div class="logo-wordmark">
      <div class="logo-text">Medeus<span>.</span></div>
      <div class="logo-sub">Medical AI</div>
    </div>
  </a>
  <div class="header-tag">Регистрация</div>
</header>

<main>
  <div class="auth-wrap">
    <div class="auth-outer">
      <div class="auth-card">

        <div class="card-header">
          <div class="card-label">Новый аккаунт</div>
          <div class="card-title" id="cardTitle">Регистрация<span class="cursor-blink"></span></div>
        </div>

        <div class="card-body">
          <div class="auth-error" id="regError"></div>

          <div id="registerForm">
            <div class="form-group-reg">
              <label class="field-label" for="login">Email</label>
              <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                <input type="email" id="login" placeholder="your@email.com" autocomplete="email">
              </div>
            </div>

            <div class="form-group-reg">
              <label class="field-label" for="fullName">Полное имя</label>
              <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" id="fullName" placeholder="Иван Иванов" autocomplete="name">
              </div>
            </div>

            <div class="form-row-reg">
              <div class="form-group-reg" style="margin-bottom:0;">
                <label class="field-label" for="gender">Пол</label>
                <div class="input-wrap">
                  <svg class="input-icon" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M16 8l4-4m0 0h-4m4 0v4"/><path d="M8 16l-4 4m0 0h4m-4 0v-4"/></svg>
                  <div class="select-wrap" style="width:100%;"><select id="gender" style="padding-left:44px;"><option value="">— выберите —</option><option value="мужской">Мужской</option><option value="женский">Женский</option></select><span style="position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:8px;color:var(--text-dim);pointer-events:none;">▼</span></div>
                </div>
              </div>
              <div class="form-group-reg" style="margin-bottom:0;">
                <label class="field-label" for="birthDate">Дата рождения</label>
                <div class="input-wrap">
                  <svg class="input-icon" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  <input type="date" id="birthDate" style="padding-left:44px;">
                </div>
              </div>
            </div>

            <div class="form-group-reg">
              <label class="field-label" for="password">Пароль</label>
              <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                <input type="password" id="password" placeholder="Минимум 6 символов" autocomplete="new-password" style="padding-right:44px;">
                <button class="pw-toggle" type="button" id="pwToggle1" tabindex="-1">
                  <svg id="eyeIcon1" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <div class="strength-wrap" id="strengthWrap">
                <div class="strength-bars"><div class="strength-bar" id="s1"></div><div class="strength-bar" id="s2"></div><div class="strength-bar" id="s3"></div><div class="strength-bar" id="s4"></div></div>
                <div class="strength-label" id="strengthLabel"></div>
              </div>
            </div>

            <div class="form-group-reg">
              <label class="field-label" for="password2">Повторите пароль</label>
              <div class="input-wrap">
                <svg class="input-icon" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                <input type="password" id="password2" placeholder="••••••••" autocomplete="new-password" style="padding-right:44px;">
                <button class="pw-toggle" type="button" id="pwToggle2" tabindex="-1">
                  <svg id="eyeIcon2" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <div class="field-hint" id="matchHint"></div>
            </div>

            <button class="btn-reg" type="button" id="registerBtn">
              <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
              <span>Зарегистрироваться</span>
            </button>

            <div class="btn-link-row">Уже есть аккаунт? <a href="auth.html">Войти</a></div>
          </div>

          <!-- Email sent screen -->
          <div class="email-sent" id="emailSentScreen">
            <div class="email-sent-icon">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <div class="email-sent-title">Проверьте почту</div>
            <div class="email-sent-desc">
              Письмо с подтверждением отправлено на<br>
              <span class="email-sent-addr" id="sentEmailAddr"></span>
            </div>
            <a href="auth.html" class="btn-reg" style="text-decoration:none;display:flex;max-width:260px;margin:0 auto;">
              <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
              Перейти к входу
            </a>
          </div>
        </div>

      </div>
    </div>
  </div>
</main>

<div class="status-bar">
  <div><span class="status-bar-dot"></span>Система активна</div>
  <div class="status-bar-right">Medeus © 2026</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script>
const EYE_OPEN   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
const EYE_CLOSED = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

function makeToggle(btnId, inputId, iconId) {
  document.getElementById(btnId).addEventListener('click', () => {
    const inp = document.getElementById(inputId);
    const ico = document.getElementById(iconId);
    const showing = inp.type === 'text';
    inp.type = showing ? 'password' : 'text';
    ico.innerHTML = showing ? EYE_OPEN : EYE_CLOSED;
  });
}
makeToggle('pwToggle1','password','eyeIcon1');
makeToggle('pwToggle2','password2','eyeIcon2');

function showError(msg) { const el = document.getElementById('regError'); el.textContent = msg; el.classList.add('show'); }
function hideError() { document.getElementById('regError').classList.remove('show'); }

// Password strength
const pw = document.getElementById('password');
const strengthWrap = document.getElementById('strengthWrap');
const strengthLabel = document.getElementById('strengthLabel');
const bars = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
const COLORS = ['#D42B2B','#FF5A00','#C48800','#2DB060'];
const LABELS = ['слабый','средний','хороший','надёжный'];

function getStrength(v) {
  let s = 0;
  if (v.length >= 8) s++;
  if (/[A-Z]/.test(v)) s++;
  if (/[0-9]/.test(v)) s++;
  if (/[^A-Za-z0-9]/.test(v)) s++;
  return s;
}
pw.addEventListener('input', () => {
  const val = pw.value;
  if (!val) { strengthWrap.classList.remove('show'); return; }
  strengthWrap.classList.add('show');
  const score = getStrength(val);
  bars.forEach((b,i) => { b.style.background = i < score ? COLORS[score-1] : 'var(--bg3)'; });
  strengthLabel.textContent = LABELS[score-1] || '';
  strengthLabel.style.color = COLORS[score-1] || 'var(--text-dim)';
  checkMatch();
});

const pw2 = document.getElementById('password2');
const matchHint = document.getElementById('matchHint');
function checkMatch() {
  if (!pw2.value) { matchHint.className = 'field-hint'; matchHint.textContent = ''; return; }
  if (pw.value === pw2.value) {
    matchHint.className = 'field-hint ok'; matchHint.textContent = '✓ пароли совпадают'; pw2.classList.remove('error');
  } else {
    matchHint.className = 'field-hint error'; matchHint.textContent = '✗ пароли не совпадают'; pw2.classList.add('error');
  }
}
pw2.addEventListener('input', checkMatch);

document.getElementById('registerBtn').addEventListener('click', async () => {
  hideError();
  const email    = document.getElementById('login').value.trim();
  const password = pw.value;
  const pw2v     = pw2.value;
  const fullName = document.getElementById('fullName').value.trim();
  const gender   = document.getElementById('gender').value;
  const birthDate= document.getElementById('birthDate').value;

  if (!email || !password || !pw2v) { showError('Заполните email и пароль'); return; }
  if (password !== pw2v) { showError('Пароли не совпадают'); return; }
  if (password.length < 6) { showError('Пароль минимум 6 символов'); return; }
  if (!fullName) { showError('Укажите ваше имя'); return; }
  if (!gender)   { showError('Выберите пол'); return; }
  if (!birthDate){ showError('Укажите дату рождения'); return; }

  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.querySelector('span').textContent = 'Создаю аккаунт...';

  try {
    const client = getSupabase();
    const { data, error } = await client.auth.signUp({ email, password });
    if (error) throw error;
    const userId = data.user?.id;
    if (userId) {
      const { error: pe } = await client.from('profiles').insert({ id: userId, full_name: fullName, gender, birth_date: birthDate });
      if (pe) console.error('Профиль:', pe.message);
    }
    if (data.user && !data.session) {
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('sentEmailAddr').textContent = email;
      document.getElementById('emailSentScreen').classList.add('show');
      document.getElementById('cardTitle').innerHTML = 'Письмо отправлено<span class="cursor-blink"></span>';
      return;
    }
    window.location.href = 'cabinet.html';
  } catch (err) {
    showError(err.message || 'Ошибка регистрации');
    btn.disabled = false; btn.querySelector('span').textContent = 'Зарегистрироваться';
  }
});
</script>
</body>
</html>
