<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medeus // Все анализы</title>
<link rel="stylesheet" href="global.css">
<style>
  body { display: flex; flex-direction: column; }
  .page { flex:1; padding:88px 52px 64px; max-width:1100px; margin:0 auto; width:100%; position:relative; z-index:1; }

  .search-wrap {
    position: relative; margin-bottom: 28px;
  }
  .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--text-dim); fill: none; pointer-events: none; }
  .search-input {
    width: 100%; padding: 14px 16px 14px 46px; height: 50px;
    border: 1px solid var(--line-mid); border-left: 3px solid var(--bg3);
    background: var(--white); font-family: var(--mono); font-size: 13px; color: var(--text);
    outline: none; transition: border-color 0.15s, border-left-color 0.15s;
  }
  .search-input:focus { border-color: var(--text); border-left-color: var(--orange); }
  .search-input::placeholder { color: var(--text-dim); }

  .list-card-wrap { background: var(--text); clip-path: polygon(20px 0%,100% 0%,100% calc(100% - 20px),calc(100% - 20px) 100%,0% 100%,0% 20px); padding: 2px; }
  .list-card { background: var(--white); clip-path: polygon(18px 0%,100% 0%,100% calc(100% - 18px),calc(100% - 18px) 100%,0% 100%,0% 18px); }

  .analyses-list { display: flex; flex-direction: column; }
  .analysis-row {
    display: grid; grid-template-columns: 44px 1fr auto auto; align-items: center; gap: 16px;
    padding: 14px 22px; border-bottom: 1px solid var(--line); cursor: pointer;
    transition: background 0.15s; animation: fadeUp 0.3s ease both;
  }
  .analysis-row:last-child { border-bottom: none; }
  .analysis-row:hover { background: var(--bg); }
  .analysis-icon { width: 36px; height: 36px; flex-shrink: 0; background: var(--bg3); display: flex; align-items: center; justify-content: center; clip-path: polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px); transition: background 0.15s; }
  .analysis-row:hover .analysis-icon { background: var(--orange); }
  .analysis-icon svg { width: 16px; height: 16px; stroke: var(--text-dim); fill: none; transition: stroke 0.15s; }
  .analysis-row:hover .analysis-icon svg { stroke: #fff; }
  .analysis-info { min-width: 0; }
  .analysis-name { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .analysis-meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 3px; letter-spacing: 0.03em; }
  .analysis-badge { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; padding: 4px 10px; background: var(--bg3); color: var(--text-dim); }
  .analysis-arrow { color: var(--text-dim); }
  .analysis-arrow svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }

  .analyses-empty { font-family: var(--mono); padding: 52px 24px; text-align: center; font-size: 12px; color: var(--text-dim); letter-spacing: 0.05em; }
  .count-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); padding: 11px 22px; border-top: 1px solid var(--line); letter-spacing: 0.05em; }
  .count-label.hidden { display: none; }

  .card-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; padding: 60px 24px; }
  .card-loader.hidden { display: none; }

  @media (max-width: 640px) { .page { padding: 78px 18px 52px; } }
</style>
</head>
<body>

<header>
  <a class="logo" href="cabinet.html">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2L12 6M12 18L12 22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M2 12L6 12M18 12L22 12M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93"/>
      </svg>
    </div>
    <div class="logo-wordmark">
      <div class="logo-text">Medeus<span>.</span></div>
      <div class="logo-sub">Medical AI</div>
    </div>
  </a>
  <div class="header-right">
    <a href="upload.html" class="btn-nav">
      <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Загрузить
    </a>
    <a href="cabinet.html" class="btn-nav btn-ghost">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Кабинет
    </a>
  </div>
</header>

<main class="page">
  <div class="page-header">
    <div>
      <div class="page-title-label">Личный кабинет</div>
      <div class="page-title">Все анализы<span class="cursor-blink"></span></div>
    </div>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" type="text" id="searchInput" placeholder="Поиск по названию...">
  </div>

  <div class="list-card-wrap">
    <div class="list-card">
      <div class="analyses-list" id="analysesList">
        <div class="card-loader" id="loader">
          <div class="loader-px"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
          <div class="loader-text">Загрузка анализов...</div>
        </div>
      </div>
      <div class="count-label hidden" id="countLabel"></div>
    </div>
  </div>
</main>

<div class="status-bar">
  <div><span class="status-bar-dot"></span>Все анализы · <span id="statusDate">—</span></div>
  <div class="status-bar-right">Medeus © 2026</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script>
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(s){if(!s)return'—';const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});}
async function apiFetch(path,session){const r=await fetch(`${API_BASE}${path}`,{headers:{'Authorization':`Bearer ${session.access_token}`}});if(r.status===401){window.location.href='auth.html';return null;}if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json();}

document.getElementById('statusDate').textContent=new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});
let allRows=[];

function renderList(rows){
  const list=document.getElementById('analysesList');
  const countEl=document.getElementById('countLabel');
  const loader=document.getElementById('loader');
  if(loader)loader.classList.add('hidden');
  if(!rows.length){list.innerHTML='<div class="analyses-empty">Ничего не найдено</div>';if(countEl)countEl.classList.add('hidden');return;}
  list.innerHTML=rows.map((row,idx)=>{
    const name=escHtml(row.analysis_name||row.filename||'—');
    const aDate=row.analysis_date?fmtDate(row.analysis_date):fmtDate(row.created_at);
    return`<div class="analysis-row" style="animation-delay:${Math.min(idx*0.025,0.5)}s" onclick="location.href='analysis.html?id=${row.id}'">
      <div class="analysis-icon"><svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
      <div class="analysis-info"><div class="analysis-name">${name}</div><div class="analysis-meta">${aDate}</div></div>
      <span class="analysis-badge">готово</span>
      <div class="analysis-arrow"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></div>
    </div>`;
  }).join('');
  if(countEl){countEl.textContent=`Всего: ${rows.length}`;countEl.classList.remove('hidden');}
}

document.getElementById('searchInput').addEventListener('input',e=>{const q=e.target.value.trim().toLowerCase();renderList(q?allRows.filter(r=>(r.analysis_name||r.filename||'').toLowerCase().includes(q)):allRows);});

(async()=>{
  const session=await requireAuth();if(!session)return;
  try{const data=await apiFetch('/history',session);if(!data)return;allRows=data.history||[];renderList(allRows);}
  catch(e){document.getElementById('loader').innerHTML='<div class="loader-text" style="color:var(--red)">Ошибка загрузки</div>';}
})();
</script>
</body>
</html>
