<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medeus // Авторизация</title>
<link rel="stylesheet" href="global.css">
<style>
  body { display: flex; flex-direction: column; overflow: hidden; }

  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 80px 24px; position: relative; z-index: 1;
  }

  .auth-wrap {
    width: 100%; max-width: 460px;
    filter: var(--shadow-drop);
  }
  /* Dark border via clip */
  .auth-outer {
    background: var(--text);
    clip-path: polygon(40px 0%,100% 0%,100% calc(100% - 40px),calc(100% - 40px) 100%,0% 100%,0% 40px);
    padding: 2px;
  }
  .auth-card {
    background: var(--white);
    clip-path: polygon(38px 0%,100% 0%,100% calc(100% - 38px),calc(100% - 38px) 100%,0% 100%,0% 38px);
  }

  .card-header {
    padding: 30px 38px 26px;
    border-bottom: 1px solid var(--line);
    background: var(--bg2);
  }
  .card-label {
    font-family: var(--mono); font-size: 9px; font-weight: 400;
    letter-spacing: 0.26em; text-transform: uppercase; color: var(--orange);
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .card-label::before { content: '/'; font-weight: 700; }
  .card-title {
    font-family: var(--sans); font-size: 24px; font-weight: 700; color: var(--text);
    display: flex; align-items: center; gap: 9px;
  }

  .card-body { padding: 34px 38px 38px; }

  .form-group { display: flex; flex-direction: column; gap: 7px; margin-bottom: 20px; }

  .field-label {
    font-family: var(--mono); font-size: 9px; font-weight: 400;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
  }
  .field-label::before { content: '/'; font-weight: 700; }

  .input-wrap { position: relative; display: flex; align-items: center; }
  .input-wrap > .input-icon {
    position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; stroke: var(--text-dim); fill: none; pointer-events: none;
    transition: stroke 0.15s;
  }
  .input-wrap:focus-within > .input-icon { stroke: var(--orange); }

  input[type="text"], input[type="password"], input[type="email"] {
    width: 100%; padding: 14px 15px 14px 44px; height: 50px;
  }

  .pw-toggle {
    position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 5px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); transition: color 0.15s; z-index: 2;
  }
  .pw-toggle:hover { color: var(--text); }
  .pw-toggle svg { width: 17px; height: 17px; stroke: currentColor; fill: none; display: block; pointer-events: none; }

  .divider { display: flex; align-items: center; gap: 14px; margin: 28px 0; }
  .divider-line { flex: 1; height: 1px; background: var(--line); }
  .divider-text { font-family: var(--mono); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dim); }

  .btn-auth-primary {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 17px 28px; margin-bottom: 12px;
    background: var(--text); color: #fff;
    border: none; font-family: var(--mono); font-size: 13px; font-weight: 700;
    letter-spacing: 0.09em; text-transform: uppercase; cursor: pointer;
    transition: background 0.18s; line-height: 1;
    clip-path: polygon(11px 0%,100% 0%,100% calc(100% - 11px),calc(100% - 11px) 100%,0% 100%,0% 11px);
  }
  .btn-auth-primary:hover { background: var(--orange); }
  .btn-auth-primary svg { width: 17px; height: 17px; stroke: currentColor; fill: none; flex-shrink: 0; }

  .btn-auth-secondary {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 16px 28px;
    background: transparent; color: var(--text);
    border: 1px solid var(--line-strong); font-family: var(--mono); font-size: 13px; font-weight: 700;
    letter-spacing: 0.09em; text-transform: uppercase; cursor: pointer;
    transition: all 0.18s; line-height: 1; text-decoration: none;
    clip-path: polygon(11px 0%,100% 0%,100% calc(100% - 11px),calc(100% - 11px) 100%,0% 100%,0% 11px);
  }
  .btn-auth-secondary:hover { background: var(--bg2); border-color: var(--orange); color: var(--orange); }
  .btn-auth-secondary svg { width: 17px; height: 17px; stroke: currentColor; fill: none; flex-shrink: 0; }

  .auth-error {
    display: none; padding: 11px 15px; margin-bottom: 16px;
    background: var(--red-pale); border: 1px solid var(--red-border);
    color: var(--red); font-family: var(--mono); font-size: 12px; letter-spacing: 0.03em;
    animation: shake 0.35s ease;
  }
  .auth-error.show { display: block; }

  @media (max-width: 480px) {
    .card-header { padding: 24px 24px 22px; }
    .card-body { padding: 28px 24px 30px; }
    .auth-outer, .auth-card { clip-path: none; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2L12 6M12 18L12 22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M2 12L6 12M18 12L22 12M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93"/>
      </svg>
    </div>
    <div class="logo-wordmark">
      <div class="logo-text">Medeus<span>.</span></div>
      <div class="logo-sub">Medical AI</div>
    </div>
  </a>
  <div class="header-tag">Авторизация</div>
</header>

<main>
  <div class="auth-wrap">
    <div class="auth-outer">
      <div class="auth-card">

        <div class="card-header">
          <div class="card-label">Вход в систему</div>
          <div class="card-title">Добро пожаловать<span class="cursor-blink"></span></div>
        </div>

        <div class="card-body">
          <div class="auth-error" id="authError"></div>

          <div class="form-group">
            <label class="field-label" for="login">Email / Логин</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              <input type="text" id="login" placeholder="your@email.com" autocomplete="username">
            </div>
          </div>

          <div class="form-group">
            <label class="field-label" for="password">Пароль</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
              <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" style="padding-right:44px;">
              <button class="pw-toggle" type="button" id="pwToggle" title="Показать пароль" tabindex="-1">
                <svg id="eyeIcon" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button class="btn-auth-primary" type="button" id="loginBtn">
            <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/>
            </svg>
            <span>Войти</span>
          </button>

          <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">или</div>
            <div class="divider-line"></div>
          </div>

          <button class="btn-auth-secondary" type="button" id="registerBtn">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
              <line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
            </svg>
            <span>Регистрация</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="status-bar">
  <div><span class="status-bar-dot"></span>Система активна</div>
  <div class="status-bar-right">Medeus © 2026</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script>
(async () => {
  const session = await getCurrentSession();
  if (session) window.location.href = 'cabinet.html';
})();

const pwToggle = document.getElementById('pwToggle');
const pwInput  = document.getElementById('password');
const eyeIcon  = document.getElementById('eyeIcon');
const EYE_OPEN   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
const EYE_CLOSED = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

pwToggle.addEventListener('click', () => {
  const isHidden = pwInput.type === 'password';
  pwInput.type = isHidden ? 'text' : 'password';
  eyeIcon.innerHTML = isHidden ? EYE_CLOSED : EYE_OPEN;
  pwToggle.title = isHidden ? 'Скрыть пароль' : 'Показать пароль';
});

function showError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.classList.add('show');
}
function hideError() { document.getElementById('authError').classList.remove('show'); }

document.getElementById('loginBtn').addEventListener('click', async () => {
  const email    = document.getElementById('login').value.trim();
  const password = pwInput.value;
  if (!email || !password) { showError('Введите email и пароль'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.querySelector('span').textContent = 'Вхожу...'; hideError();

  try {
    const client = getSupabase();
    const { error } = await client.auth.signInWithPassword({ email, password });
    if (error) throw error;
    window.location.href = 'cabinet.html';
  } catch (err) {
    showError(err.message === 'Invalid login credentials' ? 'Неверный email или пароль' : err.message || 'Ошибка входа');
    btn.disabled = false; btn.querySelector('span').textContent = 'Войти';
  }
});

document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
document.getElementById('registerBtn').addEventListener('click', () => { window.location.href = 'register.html'; });
</script>
</body>
</html>
