<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medeus // Авторизация</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF5A00;
    --orange-dim: #CC4800;
    --orange-pale: rgba(255,90,0,0.07);
    --orange-border: rgba(255,90,0,0.3);
    --bg: #F2F1EE;
    --bg2: #ECEAE6;
    --bg3: #E4E2DE;
    --white: #ffffff;
    --text: #1A1714;
    --text-mid: #5A5650;
    --text-dim: #8C8480;
    --line: rgba(0,0,0,0.1);
    --line-strong: #1A1714;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    height: 56px;
    background: var(--white);
    border-bottom: 2px solid var(--text);

  }



  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .logo-icon {
    width: 30px; height: 30px;
    background: var(--orange);
    display: flex; align-items: center; justify-content: center;
  }

  .logo-icon svg { width: 14px; height: 14px; }

  .logo-text {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .logo-text span { color: var(--orange); }

  .header-tag {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    border: 1px solid var(--line);
    padding: 4px 10px;
    background: var(--bg2);
  }

  /* ─── MAIN LAYOUT ─── */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    position: relative;
    z-index: 1;
  }

  /* ─── AUTH CARD ─── */
  .auth-card-wrap {
    width: 100%;
    max-width: 440px;
    position: relative;
    filter: drop-shadow(0 4px 28px rgba(0,0,0,0.12));
  }

  /* dark border layer via clip-path */
  .auth-card-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--text);
    clip-path: polygon(
      38px 0%,
      100% 0%,
      100% calc(100% - 38px),
      calc(100% - 38px) 100%,
      0% 100%,
      0% 38px
    );
    z-index: 0;
  }

  .auth-card {
    position: relative;
    z-index: 1;
    margin: 2px;
    background: var(--white);
    clip-path: polygon(
      36px 0%,
      100% 0%,
      100% calc(100% - 36px),
      calc(100% - 36px) 100%,
      0% 100%,
      0% 36px
    );
  }





  /* card header */
  .card-header {
    padding: 28px 36px 24px;
    border-bottom: 1px solid var(--line);
    background: var(--bg2);
  }

  .card-label {
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::before {
    content: '/';
    color: var(--orange);
    font-weight: 700;
  }

  .card-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cursor-blink {
    display: inline-block;
    width: 10px; height: 1.1em;
    background: var(--orange);
    vertical-align: text-bottom;
    animation: blink 0.9s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* card body */
  .card-body {
    padding: 32px 36px 36px;
  }

  /* ─── FORM ─── */
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 20px;
  }

  .field-label {
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .field-label::before {
    content: '/';
    color: var(--text-dim);
    font-weight: 700;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrap > svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 15px; height: 15px;
    stroke: var(--text-dim);
    fill: none;
    pointer-events: none;
    transition: stroke 0.15s;
  }

  input[type="text"],
  input[type="password"],
  input[type="email"] {
    width: 100%;
    padding: 13px 14px 13px 42px;
    border: 1px solid var(--line);
    border-left: 3px solid var(--bg3);
    background: var(--bg);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 400;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, background 0.15s, border-left-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }

  input::placeholder { color: var(--text-dim); font-size: 12px; }

  input:focus {
    border-color: var(--text);
    border-left: 3px solid var(--orange);
    background: var(--white);
  }

  input:focus + svg,
  .input-wrap:focus-within svg {
    stroke: var(--orange);
  }

  /* password toggle */
  .pw-toggle {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    transition: color 0.15s;
    line-height: 0;
    z-index: 2;
  }
  .pw-toggle:hover { color: var(--text); }
  .pw-toggle svg {
    width: 16px; height: 16px;
    stroke: currentColor;
    fill: none;
    display: block;
    pointer-events: none;
  }

  /* ─── DIVIDER ─── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .divider-text {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ─── BUTTONS ─── */
  .btn-primary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 16px 28px;
    background: var(--text);
    color: #ffffff;
    border: none;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.18s;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    line-height: 1;
    margin-bottom: 12px;
  }

  .btn-primary:hover { background: var(--orange); }
  .btn-primary:active { background: var(--orange-dim); }

  .btn-primary svg {
    width: 16px; height: 16px;
    stroke: currentColor; fill: none; flex-shrink: 0;
  }

  .btn-secondary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px 28px;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--line-strong);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, color 0.18s;
    -webkit-appearance: none;
    appearance: none;
    outline: none;
    line-height: 1;
    text-decoration: none;
  }

  .btn-secondary:hover {
    background: var(--bg2);
    border-color: var(--orange);
    color: var(--orange);
  }

  .btn-secondary svg {
    width: 16px; height: 16px;
    stroke: currentColor; fill: none; flex-shrink: 0;
  }

  /* ─── FOOTER STATUS BAR ─── */
  .status-bar {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 48px;
    height: 36px;
    background: var(--text);
    color: rgba(255,255,255,0.45);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .status-bar-dot {
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--orange);
    margin-right: 6px;
    animation: blink 1.4s step-end infinite;
  }

  .status-bar-right { color: rgba(255,255,255,0.3); }
</style>
</head>
<body>

<!-- Header -->
<header>
  <a class="logo" href="index.html">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2L12 6M12 18L12 22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M2 12L6 12M18 12L22 12M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93"/>
      </svg>
    </div>
    <div class="logo-text">Medeus<span>.</span></div>
  </a>
  <div class="header-tag">Авторизация</div>
</header>

<!-- Main -->
<main>
  <div class="auth-card-wrap">
  <div class="auth-card">

    <div class="card-header">
      <div class="card-label">Вход в систему</div>
      <div class="card-title">
        Добро пожаловать<span class="cursor-blink"></span>
      </div>
    </div>

    <div class="card-body">

      <!-- Login field -->
      <div class="form-group">
        <label class="field-label" for="login">Логин</label>
        <div class="input-wrap">
          <input type="text" id="login" placeholder="your@email.com" autocomplete="username">
          <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
      </div>

      <!-- Password field -->
      <div class="form-group">
        <label class="field-label" for="password">Пароль</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" style="padding-left:42px; padding-right:40px;">
          <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <button class="pw-toggle" type="button" id="pwToggle" title="Показать пароль" tabindex="-1">
            <svg id="eyeIcon" viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Login button -->
      <button class="btn-primary" type="button" id="loginBtn">
        <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/>
        </svg>
        <span>Войти</span>
      </button>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">или</div>
        <div class="divider-line"></div>
      </div>

      <!-- Register button -->
      <button href="register.html" class="btn-secondary" type="button" id="registerBtn">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
        <span>Регистрация</span>
      </button>

    </div>
  </div>
  </div>
</main>

<!-- Status bar -->
<div class="status-bar">
  <div><span class="status-bar-dot"></span>Система активна</div>
  <div class="status-bar-right">Medeus © 2026</div>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>

<script>
  // ─── Если уже залогинен — сразу в кабинет ───
  (async () => {
    const session = await getCurrentSession();
    if (session) window.location.href = 'cabinet.html';
  })();

  // ─── Password toggle ───
  const pwToggle = document.getElementById('pwToggle');
  const pwInput  = document.getElementById('password');
  const eyeIcon  = document.getElementById('eyeIcon');

  const EYE_OPEN   = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  const EYE_CLOSED = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

  pwToggle.addEventListener('click', () => {
    const isHidden = pwInput.type === 'password';
    pwInput.type = isHidden ? 'text' : 'password';
    eyeIcon.innerHTML = isHidden ? EYE_CLOSED : EYE_OPEN;
    pwToggle.title = isHidden ? 'Скрыть пароль' : 'Показать пароль';
  });

  // Focus effects on icon
  document.getElementById('login').addEventListener('focus', function() {
    this.parentNode.querySelector('svg').style.stroke = '#FF5A00';
  });
  document.getElementById('login').addEventListener('blur', function() {
    this.parentNode.querySelector('svg').style.stroke = '';
  });
  document.getElementById('password').addEventListener('focus', function() {
    this.parentNode.querySelectorAll('svg')[0].style.stroke = '#FF5A00';
  });
  document.getElementById('password').addEventListener('blur', function() {
    this.parentNode.querySelectorAll('svg')[0].style.stroke = '';
  });

  // ─── Вспомогательная: показать ошибку ───
  function showError(msg) {
    let el = document.getElementById('authError');
    if (!el) {
      el = document.createElement('div');
      el.id = 'authError';
      el.style.cssText = 'padding:10px 14px;margin-bottom:16px;background:rgba(229,53,53,0.1);border:1px solid rgba(229,53,53,0.3);color:#E53535;font-size:12px;letter-spacing:0.03em;';
      document.querySelector('.card-body').insertBefore(el, document.querySelector('.btn-primary'));
    }
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideError() {
    const el = document.getElementById('authError');
    if (el) el.style.display = 'none';
  }

  // ─── Вход ───
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email    = document.getElementById('login').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) { showError('Введите email и пароль'); return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.querySelector('span').textContent = 'Вхожу...';
    hideError();

    try {
      const client = getSupabase();
      const { data, error } = await client.auth.signInWithPassword({ email, password });

      if (error) throw error;
      window.location.href = 'cabinet.html';
    } catch (err) {
      showError(err.message === 'Invalid login credentials'
        ? 'Неверный email или пароль'
        : err.message || 'Ошибка входа');
      btn.disabled = false;
      btn.querySelector('span').textContent = 'Войти';
    }
  });

  // Enter для логина
  document.getElementById('password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });

  document.getElementById('registerBtn').addEventListener('click', () => {
    window.location.href = 'register.html';
  });
</script>
</body>
</html>
