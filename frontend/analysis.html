<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medeus // Анализ</title>
<link rel="stylesheet" href="global.css">
<style>
  body { display: flex; flex-direction: column; }
  .page { flex:1; padding:88px 52px 64px; max-width:1100px; margin:0 auto; width:100%; position:relative; z-index:1; }

  /* ─── INFO + FILE GRID ─── */
  .info-file-grid { display: grid; grid-template-columns: 240px 1fr; }

  /* ─── FILE THUMB ─── */
  .file-thumb-wrap { border-right: 1px solid var(--line); padding: 26px; display: flex; align-items: flex-start; justify-content: center; }
  .file-thumb { cursor: zoom-in; position: relative; }
  .file-thumb img { width: 190px; height: 190px; object-fit: cover; display: block; filter: brightness(0.97); }
  .file-thumb-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.45); opacity: 0;
    transition: opacity 0.18s; display: flex; align-items: center; justify-content: center;
  }
  .file-thumb:hover .file-thumb-overlay { opacity: 1; }
  .file-thumb-overlay svg { width: 32px; height: 32px; stroke: #fff; fill: none; }

  .file-thumb-pdf {
    width: 190px; height: 190px; background: var(--bg3);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; color: var(--text-dim);
  }
  .file-thumb-pdf svg { width: 52px; height: 52px; stroke: var(--text-dim); fill: none; }
  .file-thumb-pdf span { font-family: var(--mono); font-size: 10px; text-align: center; letter-spacing: 0.05em; word-break: break-all; padding: 0 10px; }

  /* ─── META PANEL ─── */
  .meta-panel { padding: 26px; display: flex; flex-direction: column; gap: 0; }
  .meta-item { padding: 13px 0; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 16px; }
  .meta-item:last-child { border-bottom: none; }
  .meta-key { font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-dim); min-width: 110px; flex-shrink: 0; }
  .meta-val { font-family: var(--mono); font-size: 13px; color: var(--text); font-weight: 500; }
  .meta-val.name { font-family: var(--sans); font-size: 15px; font-weight: 600; }

  .file-open-btn {
    display: inline-flex; align-items: center; gap: 8px; margin-top: 18px;
    padding: 10px 18px; background: transparent; color: var(--orange);
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; text-decoration: none;
    border: 1px solid var(--orange-border); transition: all 0.15s;
    clip-path: polygon(7px 0%,100% 0%,100% calc(100% - 7px),calc(100% - 7px) 100%,0% 100%,0% 7px);
    align-self: flex-start;
  }
  .file-open-btn:hover { background: var(--orange-pale); border-color: var(--orange); }
  .file-open-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; flex-shrink: 0; }

  /* ─── CARD ─── */
  .a-card-wrap { background: var(--text); clip-path: polygon(20px 0%,100% 0%,100% calc(100% - 20px),calc(100% - 20px) 100%,0% 100%,0% 20px); padding: 2px; margin-bottom: 24px; animation: fadeUp 0.35s ease both; }
  .a-card-wrap:nth-child(2){animation-delay:.07s}
  .a-card { background: var(--white); clip-path: polygon(18px 0%,100% 0%,100% calc(100% - 18px),calc(100% - 18px) 100%,0% 100%,0% 18px); }
  .a-card-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 26px 16px; border-bottom: 1px solid var(--line); background: var(--bg2); }
  .a-card-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); display: flex; align-items: center; gap: 7px; }
  .a-card-label::before { content: '/'; color: var(--orange); font-weight: 700; font-size: 13px; }
  .a-card-body { padding: 26px; }

  /* ─── RESULT BODY ─── */
  .result-body { font-family: var(--mono); font-size: 13px; line-height: 1.85; color: var(--text-mid); }
  .result-body h3 { font-size: 11px; font-weight: 700; color: var(--text); letter-spacing: 0.16em; text-transform: uppercase; margin: 22px 0 11px; padding-bottom: 7px; border-bottom: 1px solid var(--line-mid); }
  .result-body h3:first-child { margin-top: 0; }
  .result-body p { margin-bottom: 11px; }
  .result-body strong { color: var(--text); }

  /* ─── DELETE CONFIRM ─── */
  .delete-confirm-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    z-index: 500; align-items: center; justify-content: center; padding: 24px;
  }
  .delete-confirm-overlay.show { display: flex; }
  .delete-confirm-box {
    background: var(--white); max-width: 420px; width: 100%; padding: 36px;
    position: relative;
    clip-path: polygon(24px 0%,100% 0%,100% calc(100% - 24px),calc(100% - 24px) 100%,0% 100%,0% 24px);
    box-shadow: 0 16px 60px rgba(0,0,0,0.3);
  }
  .delete-confirm-title { font-family: var(--sans); font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
  .delete-confirm-desc  { font-family: var(--mono); font-size: 12px; color: var(--text-mid); line-height: 1.7; margin-bottom: 28px; }
  .delete-confirm-btns { display: flex; gap: 10px; }

  /* ─── LIGHTBOX ─── */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 600; align-items: center; justify-content: center; cursor: zoom-out; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; cursor: default; }
  .lightbox-close { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); cursor: pointer; transition: background 0.15s; }
  .lightbox-close:hover { background: rgba(255,255,255,0.2); }
  .lightbox-close svg { width: 18px; height: 18px; stroke: #fff; fill: none; }

  /* ─── STATES ─── */
  .state-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 80px; }
  .state-error { font-family: var(--mono); padding: 32px; text-align: center; color: var(--red); font-size: 13px; background: var(--red-pale); border: 1px solid var(--red-border); }

  @media (max-width: 720px) {
    .info-file-grid { grid-template-columns: 1fr; }
    .file-thumb-wrap { border-right: none; border-bottom: 1px solid var(--line); }
    .page { padding: 78px 18px 52px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="cabinet.html">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2L12 6M12 18L12 22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M2 12L6 12M18 12L22 12M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93"/>
      </svg>
    </div>
    <div class="logo-wordmark">
      <div class="logo-text">Medeus<span>.</span></div>
      <div class="logo-sub">Medical AI</div>
    </div>
  </a>
  <div class="header-right">
    <a href="all-analyses.html" class="btn-nav btn-ghost">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Все анализы
    </a>
    <a href="cabinet.html" class="btn-nav btn-ghost">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Кабинет
    </a>
  </div>
</header>

<main class="page" id="mainContent">
  <div class="state-loader">
    <div class="loader-px"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="loader-text">Загрузка анализа...</div>
  </div>
</main>

<!-- Delete confirm -->
<div class="delete-confirm-overlay" id="deleteConfirm">
  <div class="delete-confirm-box">
    <div class="delete-confirm-title">Удалить анализ?</div>
    <div class="delete-confirm-desc">Это действие необратимо. Файл и результат анализа будут удалены безвозвратно.</div>
    <div class="delete-confirm-btns">
      <button class="btn-secondary" id="cancelDelete">Отмена</button>
      <button class="btn-primary" id="confirmDelete" style="flex:1;background:var(--red);">
        <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
        Удалить
      </button>
    </div>
  </div>
</div>

<div class="status-bar">
  <div><span class="status-bar-dot"></span>Просмотр анализа</div>
  <div class="status-bar-right">Medeus © 2026</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script>
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatDate(s){if(!s)return'—';const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});}
function isPdf(fn){return fn&&fn.toLowerCase().endsWith('.pdf');}

const params=new URLSearchParams(location.search);
const analysisId=params.get('id');

function formatResultHtml(text){
  if(!text)return'<p style="color:var(--text-dim);">Результат отсутствует</p>';
  let html=text
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^#{1,3} (.+)$/gm,'<h3>$1</h3>')
    .replace(/выше нормы/gi,'<span class="tag-high">↑ выше нормы</span>')
    .replace(/ниже нормы/gi,'<span class="tag-low">↓ ниже нормы</span>')
    .replace(/\bнорма\b/gi,function(m,o,s){var b=s[o-1];var a=s[o+m.length];var c=/[а-яёА-ЯЁ]/;if((b&&c.test(b))||(a&&c.test(a)))return m;return'<span class="tag-normal">✓ норма</span>';})
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
  return'<p>'+html+'</p>';
}

async function loadAnalysis(){
  const session=await requireAuth();if(!session)return;
  try{
    const resp=await fetch(`${API_BASE}/analysis/${analysisId}`,{headers:{'Authorization':`Bearer ${session.access_token}`}});
    if(resp.status===401){window.location.href='auth.html';return;}
    if(resp.status===404){document.getElementById('mainContent').innerHTML='<div class="state-error">Анализ не найден</div>';return;}
    if(!resp.ok)throw new Error('Ошибка сервера');
    const{analysis}=await resp.json();
    renderAnalysis(analysis);
  }catch(e){
    document.getElementById('mainContent').innerHTML=`<div class="state-error">Ошибка загрузки: ${escHtml(e.message)}</div>`;
  }
}

function renderAnalysis(a){
  const name=a.analysis_name||a.filename||'—';
  const created=formatDate(a.created_at);
  const aDate=formatDate(a.analysis_date);
  const isImg=a.file_url&&!isPdf(a.filename);
  const mainContent=document.getElementById('mainContent');
  mainContent.innerHTML=`
    <div class="page-header">
      <div>
        <div class="page-title-label">Просмотр</div>
        <div class="page-title">${escHtml(name)}</div>
      </div>
      <div class="breadcrumb" style="align-self:center;">
        <a href="cabinet.html">Кабинет</a>
        <span class="sep">/</span>
        <a href="all-analyses.html">Анализы</a>
        <span class="sep">/</span>
        <span>${escHtml(name)}</span>
      </div>
    </div>

    <div class="a-card-wrap">
      <div class="a-card">
        <div class="a-card-header">
          <div class="a-card-label">Информация и файл</div>
          <button class="btn-nav btn-danger" id="deleteBtn">
            <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
            Удалить
          </button>
        </div>
        <div class="info-file-grid">
          <div class="file-thumb-wrap">
            ${isImg?`<div class="file-thumb" onclick="openLightbox('${escHtml(a.file_url)}')"><img src="${escHtml(a.file_url)}" alt="${escHtml(a.filename)}"><div class="file-thumb-overlay"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></div></div>`:`<div class="file-thumb-pdf"><svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>${escHtml(a.filename||'Файл')}</span></div>`}
          </div>
          <div class="meta-panel">
            <div class="meta-item"><div class="meta-key">Название</div><div class="meta-val name">${escHtml(name)}</div></div>
            <div class="meta-item"><div class="meta-key">Дата сдачи</div><div class="meta-val">${aDate}</div></div>
            <div class="meta-item"><div class="meta-key">Загружен</div><div class="meta-val">${created}</div></div>
            <div class="meta-item"><div class="meta-key">Файл</div><div class="meta-val">${escHtml(a.filename||'—')}</div></div>
            ${a.file_url?`<div class="meta-item"><a href="${escHtml(a.file_url)}" target="_blank" class="file-open-btn"><svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Открыть файл</a></div>`:''}
          </div>
        </div>
      </div>
    </div>

    <div class="a-card-wrap" style="animation-delay:.07s">
      <div class="a-card">
        <div class="a-card-header">
          <div class="a-card-label">Результат анализа ИИ</div>
          <div class="pill pill-green"><span class="pill-inner">Готово</span></div>
        </div>
        <div class="a-card-body">
          <div class="result-body">${formatResultHtml(a.result)}</div>
        </div>
      </div>
    </div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
      <div class="lightbox-close" onclick="closeLightboxBtn()"><svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
      <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
    </div>`;

  document.getElementById('deleteBtn').addEventListener('click',()=>{document.getElementById('deleteConfirm').classList.add('show');});
}

document.getElementById('cancelDelete').addEventListener('click',()=>{document.getElementById('deleteConfirm').classList.remove('show');});
document.getElementById('confirmDelete').addEventListener('click',async()=>{
  const btn=document.getElementById('confirmDelete');btn.disabled=true;btn.querySelector('span')&&(btn.querySelector('span').textContent='Удаляю...');
  const session=await getCurrentSession();if(!session){window.location.href='auth.html';return;}
  try{
    const resp=await fetch(`${API_BASE}/analysis/${analysisId}`,{method:'DELETE',headers:{'Authorization':`Bearer ${session.access_token}`}});
    if(!resp.ok)throw new Error('Ошибка удаления');
    try{localStorage.removeItem('medeus_dashboard_cache');}catch(e){}
    window.location.href='cabinet.html';
  }catch(e){btn.disabled=false;if(btn.querySelector('span'))btn.querySelector('span').textContent='Удалить';alert('Ошибка: '+e.message);}
});

function openLightbox(url){const img=document.getElementById('lightboxImg');if(img)img.src=url;const lb=document.getElementById('lightbox');if(lb){lb.classList.add('open');document.body.style.overflow='hidden';}}
function closeLightbox(e){if(e.target===document.getElementById('lightbox'))closeLightboxBtn();}
function closeLightboxBtn(){const lb=document.getElementById('lightbox');if(lb)lb.classList.remove('open');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightboxBtn();});

if(analysisId)loadAnalysis();
else document.getElementById('mainContent').innerHTML='<div class="state-error">ID анализа не указан</div>';
</script>
</body>
</html>
