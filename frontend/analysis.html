<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medeus // Анализ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="global.css">
<style>
body { display: flex; flex-direction: column; min-height: 100vh; }

.desk-nav-link {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-mid);
  text-decoration: none; padding: 6px 0; border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
}
.desk-nav-link:hover { color: var(--text); }
.desk-nav-link.active { color: var(--orange); border-bottom-color: var(--orange); }
.btn-nav-sm {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
  background: var(--bg3); border: none; cursor: pointer;
  font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-mid); text-decoration: none;
  transition: all .15s; clip-path: var(--clip-sm);
}
.btn-nav-sm:hover { background: var(--text); color: #fff; }
.btn-danger-sm {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
  background: var(--red-pale); border: 1px solid var(--red-border); cursor: pointer;
  font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--red); transition: all .15s; clip-path: var(--clip-sm);
}
.btn-danger-sm:hover { background: var(--red); color: #fff; }
.btn-danger-sm svg { width: 13px; height: 13px; stroke: currentColor; fill: none; }

/* ─── PAGE STATES ─── */
.state-loader { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 100px 20px; animation: fadeIn .3s ease; }
.state-error { padding: 60px 20px; text-align: center; font-family: var(--mono); font-size: 13px; color: var(--red); }

/* ─── A-CARD ─── */
.a-card-outer {
  background: var(--text);
  clip-path: polygon(18px 0%, 100% 0%, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0% 100%, 0% 18px);
  padding: 2px; margin-bottom: 16px; animation: fadeUp .35s ease both;
}
.a-card-outer:nth-child(2){animation-delay:.06s}
.a-card-outer:nth-child(3){animation-delay:.12s}
.a-card {
  background: var(--white);
  clip-path: polygon(16px 0%, 100% 0%, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0% 100%, 0% 16px);
}
.a-card-header {
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  padding: 14px 22px 12px; border-bottom: 1px solid var(--line); background: var(--bg2);
}
.a-card-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-dim); display: flex; align-items: center; gap: 6px;
}
.a-card-label::before { content: '/'; color: var(--orange); font-weight: 700; font-size: 12px; }
.a-card-body { padding: 22px; }

/* ─── INFO + FILE GRID ─── */
.info-file-grid { display: grid; grid-template-columns: 1fr; gap: 0; }
@media (min-width: 640px) { .info-file-grid { grid-template-columns: 180px 1fr; } }

.file-thumb-wrap {
  padding: 20px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: flex-start; justify-content: center;
}
@media (min-width: 640px) {
  .file-thumb-wrap {
    border-bottom: none; border-right: 1px solid var(--line);
    align-items: center; padding: 24px 20px;
  }
}

.file-thumb {
  width: 120px; height: 140px; overflow: hidden; cursor: pointer; position: relative;
  background: var(--bg3); border: 1px solid var(--line-mid);
}
.file-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .2s; }
.file-thumb:hover img { transform: scale(1.04); }
.file-thumb-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,.55); display: flex;
  align-items: center; justify-content: center; opacity: 0; transition: opacity .2s;
}
.file-thumb:hover .file-thumb-overlay { opacity: 1; }
.file-thumb-overlay svg { width: 24px; height: 24px; stroke: #fff; fill: none; }

.file-thumb-pdf {
  width: 120px; height: 140px; background: var(--bg3); border: 1px solid var(--line-mid);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
}
.file-thumb-pdf svg { width: 34px; height: 34px; stroke: var(--orange); fill: none; }
.file-thumb-pdf span { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-align: center; line-height: 1.4; padding: 0 8px; word-break: break-all; }

.meta-panel { padding: 20px 22px; display: flex; flex-direction: column; gap: 12px; }
.meta-item { display: flex; flex-direction: column; gap: 3px; }
.meta-key { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); }
.meta-val { font-family: var(--mono); font-size: 13px; color: var(--text); font-weight: 600; word-break: break-word; }
.meta-val.name { font-family: var(--sans); font-size: 15px; font-weight: 700; }

.file-open-btn {
  display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px;
  background: var(--bg3); font-family: var(--mono); font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-mid); text-decoration: none;
  transition: all .15s; clip-path: var(--clip-sm); border: none;
}
.file-open-btn:hover { background: var(--text); color: #fff; }
.file-open-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; }

/* ─── RESULT TWO-COL ─── */
.result-two-col { display: flex; flex-direction: column; gap: 16px; }
.result-block { padding: 0; }
.result-block-label {
  font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-dim); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--line-mid);
  display: flex; align-items: center; gap: 7px;
}
.result-block-label::before { content: ''; width: 4px; height: 4px; background: var(--orange); display: inline-block; flex-shrink: 0; }
.summary-type { font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--orange); margin-bottom: 8px; }
.summary-status { font-family: var(--sans); font-size: 13px; color: var(--text); line-height: 1.7; margin-bottom: 12px; }
.rec-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
.rec-item { display: flex; gap: 8px; font-family: var(--mono); font-size: 11px; color: var(--text-mid); line-height: 1.6; }
.rec-item::before { content: '→'; color: var(--orange); flex-shrink: 0; }
.rec-all-good { display: flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 11px; color: var(--green); }
.rec-all-good::before { content: '✓'; font-weight: 700; }

/* indicators table in result */
.ind-res-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.ind-res-table thead th { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); padding: 7px 10px; text-align: left; border-bottom: 1px solid var(--line-mid); background: var(--bg3); white-space: nowrap; }
.ind-res-table tbody tr { border-bottom: 1px solid var(--line); cursor: pointer; transition: background .1s; }
.ind-res-table tbody tr:last-child { border-bottom: none; }
.ind-res-table tbody tr:hover { background: var(--orange-pale); }
.ind-res-table tbody td { padding: 7px 10px; font-family: var(--mono); color: var(--text-mid); }
.col-name { color: var(--text); font-weight: 600; }
.tag-ok  { color: var(--green);  font-weight: 700; font-size: 10px; letter-spacing: 0.06em; }
.tag-high{ color: var(--red);    font-weight: 700; font-size: 10px; letter-spacing: 0.06em; }
.tag-low { color: #3b82f6;       font-weight: 700; font-size: 10px; letter-spacing: 0.06em; }
.tag-dev { color: var(--yellow); font-weight: 700; font-size: 10px; letter-spacing: 0.06em; }

/* ─── PILL ─── */
.pill { display: inline-flex; align-items: center; font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; padding: 4px 10px; }
.pill-green { background: var(--green-pale); color: var(--green); }
.pill-red   { background: var(--red-pale);   color: var(--red); }

/* ─── DELETE OVERLAY ─── */
.delete-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.6); align-items: center; justify-content: center; padding: 20px;
}
.delete-overlay.show { display: flex; }
.delete-box {
  background: var(--white); width: 100%; max-width: 400px; padding: 32px 28px;
  clip-path: polygon(18px 0%, 100% 0%, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0% 100%, 0% 18px);
  animation: slideUp .25s ease both;
}
.delete-box-title { font-family: var(--sans); font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
.delete-box-desc  { font-family: var(--mono); font-size: 12px; color: var(--text-mid); line-height: 1.7; margin-bottom: 24px; }
.delete-box-actions { display: flex; gap: 10px; }

/* ─── LIGHTBOX ─── */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,.9); align-items: center; justify-content: center; padding: 20px;
}
.lightbox.open { display: flex; }
.lightbox-close {
  position: absolute; top: 16px; right: 16px; width: 40px; height: 40px;
  background: rgba(255,255,255,.12); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; clip-path: var(--clip-sm); transition: background .15s;
}
.lightbox-close:hover { background: var(--orange); }
.lightbox-close svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2.5; }
.lightbox img { max-width: 100%; max-height: 90vh; object-fit: contain; }
</style>
</head>

<header>
  <a class="logo" href="cabinet.html">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L12 6M12 18L12 22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M2 12L6 12M18 12L22 12M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93" stroke-linecap="round"/></svg>
    </div>

      <div class="logo-text">Medeus<span>.</span></div>
      <div class="logo-sub">Medical AI</div>

  <nav class="header-actions desktop-nav" id="desktopNav" style="display:flex;gap:24px;align-items:center;"></nav>
  <div class="header-actions desktop-nav" style="gap:8px;">
    <a href="all-analyses.html" class="btn-nav-sm">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" width="13" height="13"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>

</header>

<nav class="mobile-nav" id="mobileNav"></nav>

<main class="page" id="mainContent">
  <div class="state-loader">
    <div class="loader-px"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="loader-text">Загрузка анализа...</div>
  </div>
</main>

<!-- Delete confirm -->
<div class="delete-overlay" id="deleteOverlay">
  <div class="delete-box">
    <div class="delete-box-title">Удалить анализ?</div>
    <div class="delete-box-desc">Это действие необратимо. Файл и результат анализа будут удалены навсегда.</div>
    <div class="delete-box-actions">
      <button class="btn btn-secondary" id="cancelDeleteBtn" style="flex:1;">Отмена</button>
      <button class="btn btn-danger" id="confirmDeleteBtn" style="flex:1;">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
        <span>Удалить</span>
      </button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">
    <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <img id="lightboxImg" src="" alt="">
</div>

<div class="status-bar">
  <div><span class="status-dot"></span>Просмотр анализа</div>
  <div style="color:rgba(255,255,255,.2)">Medeus © 2026</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script>
const PAGES=[
  {id:'cabinet',href:'cabinet.html',label:'Кабинет',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`},
  {id:'upload',href:'upload.html',label:'Анализ',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`},
  {id:'indicators',href:'indicators.html',label:'Данные',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`},
  {id:'profile',href:'profile.html',label:'Профиль',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`},
];
document.getElementById('mobileNav').innerHTML=PAGES.map(p=>`<a href="${p.href}" class="mobile-nav-item">${p.icon}${p.label}</a>`).join('');
document.getElementById('desktopNav').innerHTML=PAGES.map(p=>`<a href="${p.href}" class="desk-nav-link">${p.label}</a>`).join('');

function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(s){if(!s)return'—';const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});}
function isPdf(fn){return fn&&fn.toLowerCase().endsWith('.pdf');}

const params=new URLSearchParams(location.search);
const analysisId=params.get('id');

// Lightbox
document.getElementById('lightboxClose').addEventListener('click',()=>{document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';});
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===document.getElementById('lightbox')){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('lightbox').classList.remove('open');document.body.style.overflow='';}});
function openLightbox(url){document.getElementById('lightboxImg').src=url;document.getElementById('lightbox').classList.add('open');document.body.style.overflow='hidden';}

// Delete
document.getElementById('cancelDeleteBtn').addEventListener('click',()=>document.getElementById('deleteOverlay').classList.remove('show'));
document.getElementById('confirmDeleteBtn').addEventListener('click',async()=>{
  const btn=document.getElementById('confirmDeleteBtn');btn.disabled=true;btn.querySelector('span').textContent='Удаляю...';
  const session=await getCurrentSession();if(!session){window.location.href='auth.html';return;}
  try{
    const resp=await fetch(`${API_BASE}/analysis/${analysisId}`,{method:'DELETE',headers:{'Authorization':`Bearer ${session.access_token}`}});
    if(!resp.ok)throw new Error('Ошибка удаления');
    try{localStorage.removeItem('medeus_dash_v3');}catch(e){}
    window.location.href='cabinet.html';
  }catch(e){btn.disabled=false;btn.querySelector('span').textContent='Удалить';alert('Ошибка: '+e.message);}
});

function parseAnalysisResult(text){
  const result={analysisType:'',status:'',recommendations:[],indicators:[]};
  if(!text)return result;
  try{
    let data=text;
    if(typeof text==='string'){const cleaned=text.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();data=JSON.parse(cleaned);}
    if(data&&typeof data==='object'){
      result.analysisType=data.analysis_type||'';result.status=data.summary||'';
      if(Array.isArray(data.recommendations))result.recommendations=data.recommendations;
      if(Array.isArray(data.indicators)){result.indicators=data.indicators.map(ind=>{const s=(ind.status||'').toLowerCase().trim();let status='normal';if(s==='above'||s.includes('выше'))status='above';else if(s==='below'||s.includes('ниже'))status='below';else if(s==='deviation'||s.includes('отклонение'))status='deviation';return{name:ind.name||ind.original_name||'',value:ind.value||'',status};});}
      return result;
    }
  }catch(e){}
  let section='';
  for(const rawLine of text.split('\n')){
    const line=rawLine.trim();if(!line)continue;const up=line.toUpperCase();
    if(up.startsWith('ТИП АНАЛИЗА:')){result.analysisType=line.replace(/^ТИП АНАЛИЗА:\s*/i,'').trim();continue;}
    if(up.startsWith('ОБЩЕЕ СОСТОЯНИЕ:')){result.status=line.replace(/^ОБЩЕЕ СОСТОЯНИЕ:\s*/i,'').trim();section='status';continue;}
    if(up.startsWith('РЕКОМЕНДАЦИИ')){section='rec';continue;}
    if(up.startsWith('ПОКАЗАТЕЛИ')){section='ind';continue;}
    if(section==='rec'){const clean=line.replace(/^[-•→*]\s*/,'').trim();if(clean.length>5)result.recommendations.push(clean);}
    else if(section==='ind'){const parts=line.split(' - ');if(parts.length>=3){const name=parts[0].trim(),value=parts[1].trim(),sr=parts[2].trim().toLowerCase();let status='normal';if(sr.includes('выше'))status='above';else if(sr.includes('ниже'))status='below';if(name.length>=2)result.indicators.push({name,value,status});}}
  }
  return result;
}

function renderResultBlocks(text){
  const parsed=parseAnalysisResult(text);
  const sumEl=document.getElementById('summaryBlock');
  if(!sumEl)return;
  let sumHtml='';
  if(parsed.analysisType)sumHtml+=`<div class="summary-type">${escHtml(parsed.analysisType)}</div>`;
  if(parsed.status)sumHtml+=`<div class="summary-status">${escHtml(parsed.status)}</div>`;
  if(parsed.recommendations.length){sumHtml+='<ul class="rec-list">';parsed.recommendations.forEach(r=>{if(r.toLowerCase().includes('все показатели в норме')){sumHtml+=`<li class="rec-all-good">${escHtml(r)}</li>`;}else{sumHtml+=`<li class="rec-item">${escHtml(r)}</li>`;}});sumHtml+='</ul>';}
  sumEl.innerHTML=sumHtml||'<div style="color:var(--text-dim);font-family:var(--mono);font-size:12px;">Данные не найдены</div>';
  const tbody=document.getElementById('resultTableBody');
  if(tbody){
    if(parsed.indicators.length){tbody.innerHTML=parsed.indicators.map(ind=>{const sc=ind.status==='above'?'tag-high':ind.status==='below'?'tag-low':ind.status==='deviation'?'tag-dev':'tag-ok';const sl=ind.status==='above'?'↑ выше нормы':ind.status==='below'?'↓ ниже нормы':ind.status==='deviation'?'⚠ отклонение':'✓ норма';const href=`indicator.html?name=${encodeURIComponent(ind.name)}`;return`<tr onclick="window.location.href='${href}'" style="cursor:pointer;"><td class="col-name">${escHtml(ind.name)}</td><td>${escHtml(ind.value)}</td><td><span class="${sc}">${sl}</span></td></tr>`;}).join('');}
    else tbody.innerHTML='<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--text-dim);font-family:var(--mono);font-size:12px;">Таблица не найдена</td></tr>';
  }
}

function renderAnalysis(a){
  const name=a.analysis_name||a.filename||'—';
  const isImg=a.file_url&&!isPdf(a.filename);
  const isManual=!a.file_url;
  const mc=document.getElementById('mainContent');

  mc.innerHTML=`
  <div class="page-header" style="animation:fadeUp .35s ease both;">
    <div>
      <div class="breadcrumb">
        <a href="cabinet.html">Кабинет</a><span class="sep">/</span>
        <a href="all-analyses.html">Анализы</a><span class="sep">/</span>
        <span>${escHtml(name)}</span>
      </div>
      <div class="page-title">${escHtml(name)}</div>
    </div>
    <div class="page-meta" style="text-align:right;">Дата сдачи<br><strong style="color:var(--text)">${fmtDate(a.analysis_date)||'—'}</strong></div>
  </div>

  <div class="a-card-outer">
    <div class="a-card">
      <div class="a-card-header">
        <div class="a-card-label">Информация</div>
        <button class="btn-danger-sm" id="deleteBtn">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
          Удалить
        </button>
      </div>
      <div class="info-file-grid">
        <div class="file-thumb-wrap">
          ${isManual
            ? `<div class="file-thumb-pdf"><svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><span>Внесено<br>вручную</span></div>`
            : isImg
              ? `<div class="file-thumb" onclick="openLightbox('${escHtml(a.file_url)}')"><img src="${escHtml(a.file_url)}" alt="${escHtml(a.filename)}"><div class="file-thumb-overlay"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></div></div>`
              : `<div class="file-thumb-pdf"><svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><span>${escHtml(a.filename||'Файл')}</span></div>`
          }
        </div>
        <div class="meta-panel">
          <div class="meta-item"><div class="meta-key">Название</div><div class="meta-val name">${escHtml(name)}</div></div>
          <div class="meta-item"><div class="meta-key">Дата сдачи</div><div class="meta-val">${fmtDate(a.analysis_date)||'—'}</div></div>
          <div class="meta-item"><div class="meta-key">Добавлено</div><div class="meta-val">${fmtDate(a.created_at)}</div></div>
          <div class="meta-item"><div class="meta-key">Файл</div><div class="meta-val">${isManual?'<span style="color:var(--orange);">Внесено вручную</span>':escHtml(a.filename||'—')}</div></div>
          ${a.file_url?`<div class="meta-item"><a href="${escHtml(a.file_url)}" target="_blank" class="file-open-btn"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Открыть файл</a></div>`:''}
        </div>
      </div>
    </div>
  </div>

  <div class="a-card-outer" style="animation-delay:.08s;">
    <div class="a-card">
      <div class="a-card-header">
        <div class="a-card-label">Результат анализа ИИ</div>
        <span class="pill pill-green">Готово</span>
      </div>
      <div class="a-card-body">
        <div class="result-two-col">
          <div class="result-block">
            <div id="summaryBlock"></div>
          </div>
          <div class="result-block">
            <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">
              <table class="ind-res-table">
                <thead><tr><th>Показатель</th><th>Значение</th><th>Статус</th></tr></thead>
                <tbody id="resultTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;

  document.getElementById('deleteBtn').addEventListener('click',()=>document.getElementById('deleteOverlay').classList.add('show'));
  renderResultBlocks(a.result);
}

async function loadAnalysis(){
  const session=await requireAuth();if(!session)return;
  if(!analysisId){document.getElementById('mainContent').innerHTML='<div class="state-error">ID анализа не указан</div>';return;}
  try{
    const resp=await fetch(`${API_BASE}/analysis/${analysisId}`,{headers:{'Authorization':`Bearer ${session.access_token}`}});
    if(resp.status===401){window.location.href='auth.html';return;}
    if(resp.status===404){document.getElementById('mainContent').innerHTML='<div class="state-error">Анализ не найден</div>';return;}
    if(!resp.ok)throw new Error('Ошибка сервера');
    const{analysis}=await resp.json();
    renderAnalysis(analysis);
  }catch(e){
    document.getElementById('mainContent').innerHTML=`<div class="state-error">Ошибка загрузки: ${escHtml(e.message)}</div>`;
  }
}
loadAnalysis();
</script>

</html>
