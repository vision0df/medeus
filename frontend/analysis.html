<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medeus // Анализ</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="global.css">
<style>

  /* ─── CARD CTA BUTTONS ─── */
  .btn-primary-sm {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 18px; background: var(--text); color: #ffffff;
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    text-decoration: none; border: none; outline: none; cursor: pointer;
    transition: background 0.18s; white-space: nowrap;
    clip-path: polygon(8px 0%, 100% 0%, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0% 100%, 0% 8px);
  }
  .btn-primary-sm:hover { background: var(--orange); }
  .btn-primary-sm svg { width: 13px; height: 13px; stroke: currentColor; fill: none; flex-shrink: 0; }

  .btn-danger svg { width: 12px; height: 12px; stroke: currentColor; fill: none; flex-shrink: 0; }

  /* ─── LAYOUT ─── */
  .page {
    flex: 1;
    padding: 80px 48px 60px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
    position: relative; z-index: 1;
  }

  /* ─── CARD ─── */
  .card-wrap {
    background: var(--text);
    clip-path: polygon(18px 0%,100% 0%,100% calc(100% - 18px),calc(100% - 18px) 100%,0% 100%,0% 18px);
    padding: 2px;
    margin-bottom: 20px;
    animation: fadeIn 0.4s ease both;
  }

  .card {
    background: var(--white);
    clip-path: polygon(16px 0%,100% 0%,100% calc(100% - 16px),calc(100% - 16px) 100%,0% 100%,0% 16px);
  }

  .card-
  .card-label {
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dim); display: flex; align-items: center; gap: 6px;
  }
  .card-label::before { content: '/'; color: var(--orange); font-weight: 700; font-size: 12px; }

  .card-
  /* ─── META GRID ─── */
  /* ─── INFO + FILE COMBINED ─── */
  .info-file-grid { display: grid; grid-template-columns: 200px 1fr; min-height: 180px; }

  .file-thumb-wrap {
    border-right: 1px solid var(--line); background: var(--bg2);
    display: flex; align-items: stretch; overflow: hidden; min-height: 180px;
  }
  .file-thumb {
    flex: 1; position: relative; cursor: pointer;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .file-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.2s; }
  .file-thumb:hover img { transform: scale(1.05); }
  .file-thumb-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0);
    display: flex; align-items: center; justify-content: center; transition: background 0.2s;
  }
  .file-thumb:hover .file-thumb-overlay { background: rgba(0,0,0,0.38); }
  .file-thumb-overlay svg { width: 28px; height: 28px; stroke: #fff; fill: none; opacity: 0; transition: opacity 0.2s; }
  .file-thumb:hover .file-thumb-overlay svg { opacity: 1; }

  .file-thumb-pdf {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; padding: 20px; color: var(--text-dim); text-align: center;
  }
  .file-thumb-pdf svg { width: 36px; height: 36px; stroke: var(--text-dim); fill: none; }
  .file-thumb-pdf span { font-size: 10px; letter-spacing: 0.05em; word-break: break-all; }

  .meta-panel { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
  .meta-item { display: flex; flex-direction: column; gap: 3px; }
  .meta-key { font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); }
  .meta-val { font-size: 13px; font-weight: 600; color: var(--text); }
  .meta-val.name { font-size: 15px; font-weight: 700; }

  .file-open-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 18px; margin-top: auto; align-self: flex-start;
    background: var(--text); color: var(--white);
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    text-decoration: none; border: none; cursor: pointer; transition: background 0.15s;
    clip-path: polygon(7px 0%,100% 0%,100% calc(100% - 7px),calc(100% - 7px) 100%,0% 100%,0% 7px);
  }
  .file-open-btn:hover { background: var(--orange); }
  .file-open-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; }

  .lightbox {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.88); align-items: center; justify-content: center; cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 92vw; max-height: 90vh; object-fit: contain; display: block; cursor: default; }
  .lightbox-close {
    position: absolute; top: 20px; right: 24px; width: 36px; height: 36px;
    background: rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s;
    clip-path: polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px);
  }
  .lightbox-close:hover { background: var(--orange); }
  .lightbox-close svg { width: 18px; height: 18px; stroke: #fff; fill: none; }

  /* ─── AI RESULT ─── */
  .result-
  /* ─── DELETE CONFIRM ─── */
  .delete-confirm {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center; justify-content: center;
  }
  .delete-confirm.show { display: flex; }

  .delete-dialog {
    background: var(--white);
    border: 2px solid var(--text);
    padding: 32px;
    max-width: 380px;
    width: 90%;
    animation: fadeIn 0.2s ease both;
  }

  .delete-dialog-title {
    font-size: 16px; font-weight: 700; margin-bottom: 10px;
  }

  .delete-dialog-desc {
    font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-bottom: 24px;
  }

  .delete-dialog-btns {
    display: flex; gap: 10px;
  }

  .btn-cancel {
    flex: 1; padding: 12px;
    background: var(--bg2); color: var(--text-mid);
    border: 1px solid var(--line);
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; outline: none; transition: background 0.15s;
  }
  .btn-cancel:hover { background: var(--bg3); }

  .btn-confirm-delete {
    flex: 1; padding: 12px;
    background: var(--red); color: #fff;
    border: none;
    font-family: var(--mono); font-size: 12px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; outline: none; transition: background 0.15s;
  }
  .btn-confirm-delete:hover { background: #b02020; }
  .btn-confirm-delete:disabled { opacity: 0.6; cursor: not-allowed; }

  /* ─── LOADING / ERROR ─── */
  .state-loading, .state-error {
    text-align: center; padding: 80px 24px;
    font-size: 12px; color: var(--text-dim); letter-spacing: 0.05em;
    animation: fadeIn 0.3s ease both;
  }
  .state-error { color: var(--red); }

  /* ─── STATUS BAR ─── */

  @media (max-width: 700px) {
    .page { padding: 72px 16px 48px; }
    .meta-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="cabinet.html">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2L12 6M12 18L12 22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M2 12L6 12M18 12L22 12M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93"/>
      </svg>
    </div>
    <div class="logo-text">Medeus<span>.</span></div>
  </a>

    <div class="header-right">
    <a href="cabinet.html" class="btn-nav">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Кабинет</span>
    </a>
  </div>
</header>

<main class="page" id="mainContent">
  <div class="state-loading">Загрузка анализа...</div>
</main>

<!-- Подтверждение удаления -->
<div class="delete-confirm" id="deleteConfirm">
  <div class="delete-dialog">
    <div class="delete-dialog-title">Удалить анализ?</div>
    <div class="delete-dialog-desc">Файл и результат будут удалены безвозвратно. Это действие нельзя отменить.</div>
    <div class="delete-dialog-btns">
      <button class="btn-cancel" id="cancelDelete">Отмена</button>
      <button class="btn-confirm-delete" id="confirmDelete">Удалить</button>
    </div>
  </div>
</div>

<div class="status-bar">
  <div><span class="status-bar-dot"></span>Просмотр анализа</div>
  <div class="status-bar-right">Medeus © 2026</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>

<script>
  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatDate(str) {
    if (!str) return '—';
    // ISO date "2026-04-12" or datetime
    const d = new Date(str);
    if (isNaN(d)) return str;
    return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  function isPdf(filename) {
    return String(filename).toLowerCase().endsWith('.pdf');
  }

  // Получаем ID из URL (?id=xxx)
  const params = new URLSearchParams(location.search);
  const analysisId = params.get('id');

  if (!analysisId) {
    document.getElementById('mainContent').innerHTML =
      '<div class="state-error">ID анализа не указан</div>';
  }

  async function loadAnalysis() {
    const session = await requireAuth();
    if (!session) return;

    try {
      const resp = await fetch(`${API_BASE}/analysis/${analysisId}`, {
        headers: { 'Authorization': `Bearer ${session.access_token}` },
      });

      if (resp.status === 401) { window.location.href = 'auth.html'; return; }
      if (resp.status === 404) {
        document.getElementById('mainContent').innerHTML =
          '<div class="state-error">Анализ не найден</div>';
        return;
      }
      if (!resp.ok) throw new Error('Ошибка сервера');

      const { analysis } = await resp.json();
      renderAnalysis(analysis);

    } catch (e) {
      document.getElementById('mainContent').innerHTML =
        `<div class="state-error">Ошибка загрузки: ${escHtml(e.message)}</div>`;
    }
  }

  function renderAnalysis(a) {
    const name    = a.analysis_name || a.filename || '—';
    const created = formatDate(a.created_at);
    const aDate   = formatDate(a.analysis_date);
    const gender  = a.gender === 'male' ? 'Мужской' : a.gender === 'female' ? 'Женский' : (a.gender || '—');


    const isImg = a.file_url && !isPdf(a.filename);

    document.getElementById('mainContent').innerHTML = `
      <div class="page-header">
        <div>
          <div class="page-title-label">Анализ</div>
          <div class="page-title">${escHtml(name)}</div>
        </div>
      </div>

      <!-- Информация + файл -->
      <div class="card-wrap">
        <div class="card">
          <div class="card-header">
            <div class="card-label">Информация</div>
            <button class="btn-nav btn-danger" id="deleteBtn">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
        <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
      </svg>
      <span>Удалить</span>
    </button>
          </div>
          <div class="info-file-grid">
            <div class="file-thumb-wrap">
              ${isImg ? `
                <div class="file-thumb" onclick="openLightbox('${escHtml(a.file_url)}')">
                  <img src="${escHtml(a.file_url)}" alt="${escHtml(a.filename)}">
                  <div class="file-thumb-overlay">
                    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                      <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
                    </svg>
                  </div>
                </div>` : `
                <div class="file-thumb-pdf">
                  <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                  </svg>
                  <span>${escHtml(a.filename || 'Файл')}</span>
                </div>`}
            </div>
            <div class="meta-panel">
              <div class="meta-item">
                <div class="meta-key">Название</div>
                <div class="meta-val name">${escHtml(name)}</div>
              </div>
              <div class="meta-item">
                <div class="meta-key">Дата сдачи</div>
                <div class="meta-val">${aDate}</div>
              </div>
              <div class="meta-item">
                <div class="meta-key">Загружен</div>
                <div class="meta-val">${created}</div>
              </div>
              <div class="meta-item">
                <div class="meta-key">Файл</div>
                <div class="meta-val">${escHtml(a.filename || '—')}</div>
              </div>
              ${a.file_url ? `
              <a href="${escHtml(a.file_url)}" target="_blank" class="file-open-btn">
                <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                  <polyline points="15 3 21 3 21 9"/>
                  <line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
                Открыть файл
              </a>` : ''}
            </div>
          </div>
        </div>
      </div>

      <!-- Результат ИИ -->
      <div class="card-wrap" style="animation-delay:0.05s">
        <div class="card">
          <div class="card-header">
            <div class="card-label">Результат анализа ИИ</div>
          </div>
          <div class="card-body">
            <div class="result-body">${escHtml(a.result || 'Результат отсутствует')}</div>
          </div>
        </div>
      </div>

      <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <div class="lightbox-close" onclick="closeLightboxBtn()">
          <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </div>
        <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
      </div>
    `;

    // ─── Удаление ───
    document.getElementById('deleteBtn').addEventListener('click', () => {
      document.getElementById('deleteConfirm').classList.add('show');
    });
  }

  document.getElementById('cancelDelete').addEventListener('click', () => {
    document.getElementById('deleteConfirm').classList.remove('show');
  });

  document.getElementById('confirmDelete').addEventListener('click', async () => {
    const btn = document.getElementById('confirmDelete');
    btn.disabled = true;
    btn.textContent = 'Удаляю...';

    const session = await getCurrentSession();
    if (!session) { window.location.href = 'auth.html'; return; }

    try {
      const resp = await fetch(`${API_BASE}/analysis/${analysisId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${session.access_token}` },
      });

      if (!resp.ok) throw new Error('Ошибка удаления');
      try { localStorage.removeItem('medeus_dashboard_cache'); } catch (e) {}
      window.location.href = 'cabinet.html';

    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Удалить';
      alert('Ошибка: ' + e.message);
    }
  });

  // ─── Init ───
  if (analysisId) loadAnalysis();

  function openLightbox(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox(e) {
    if (e.target === document.getElementById('lightbox')) closeLightboxBtn();
  }
  function closeLightboxBtn() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightboxBtn(); });
</script>
</body>
</html>
