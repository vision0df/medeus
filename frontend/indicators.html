<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medeus // Показатели</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="global.css">
<style>
body { display: flex; flex-direction: column; min-height: 100vh; }

.desk-nav-link {
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-mid);
  text-decoration: none; padding: 6px 0; border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
}
.desk-nav-link:hover { color: var(--text); }
.desk-nav-link.active { color: var(--orange); border-bottom-color: var(--orange); }
.btn-nav-sm {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
  background: var(--bg3); border: none; cursor: pointer;
  font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-mid); text-decoration: none;
  transition: all .15s; clip-path: var(--clip-sm);
}
.btn-nav-sm:hover { background: var(--text); color: #fff; }

/* ─── STATS ROW ─── */
.stats-row {
  display: grid; grid-template-columns: repeat(2,1fr); gap: 10px;
  margin-bottom: 24px; animation: fadeUp .35s ease both;
}
@media (min-width: 600px) { .stats-row { grid-template-columns: repeat(4,1fr); } }

.stat-card {
  background: var(--text);
  clip-path: polygon(10px 0%,100% 0%,100% calc(100% - 10px),calc(100% - 10px) 100%,0% 100%,0% 10px);
  padding: 2px;
}
.stat-card-inner {
  background: var(--white);
  clip-path: polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);
  padding: 14px 16px; display: flex; align-items: center; gap: 12px;
}
.stat-card.ok    .stat-card-inner { background: var(--green-pale); }
.stat-card.warn  .stat-card-inner { background: var(--yellow-pale); }
.stat-card.alert .stat-card-inner { background: var(--red-pale); }
.stat-icon {
  width: 32px; height: 32px; flex-shrink: 0; background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  clip-path: var(--clip-sm);
}
.stat-card.ok    .stat-icon { background: var(--green-pale); }
.stat-card.warn  .stat-icon { background: var(--yellow-pale); }
.stat-card.alert .stat-icon { background: var(--red-pale); }
.stat-icon svg { width: 14px; height: 14px; stroke: var(--text-mid); fill: none; }
.stat-card.ok    .stat-icon svg { stroke: var(--green); }
.stat-card.warn  .stat-icon svg { stroke: var(--yellow); }
.stat-card.alert .stat-icon svg { stroke: var(--red); }
.stat-num  { font-family: var(--sans); font-size: 22px; font-weight: 800; color: var(--text); line-height: 1; }
.stat-card.ok    .stat-num { color: var(--green); }
.stat-card.warn  .stat-num { color: var(--yellow); }
.stat-card.alert .stat-num { color: var(--red); }
.stat-lbl  { font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); margin-top: 2px; }

/* ─── FILTER BAR ─── */
.filter-bar {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  margin-bottom: 14px; animation: fadeUp .4s ease both;
}
.filter-lbl { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); flex-shrink: 0; margin-right: 4px; }
.filter-btn {
  padding: 6px 12px; background: var(--bg3); border: 1px solid var(--line-mid); cursor: pointer;
  font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-dim); transition: all .15s; display: flex; align-items: center; gap: 5px;
}
.filter-btn:hover { border-color: var(--text); color: var(--text); }
.filter-btn.active      { background: var(--text);       color: #fff; border-color: var(--text); }
.filter-btn.active-ok   { background: var(--green);      color: #fff; border-color: var(--green); }
.filter-btn.active-warn { background: var(--yellow);     color: #fff; border-color: var(--yellow); }
.filter-btn.active-alert{ background: var(--red);        color: #fff; border-color: var(--red); }
.filter-btn .fdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.fdot-all  { background: var(--text-dim); }
.fdot-ok   { background: var(--green); }
.fdot-warn { background: var(--yellow); }
.fdot-alert{ background: var(--red); }

/* ─── CATEGORY SCROLL ─── */
.cat-scroll {
  display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch;
  margin-bottom: 16px; padding-bottom: 4px; animation: fadeUp .45s ease both;
}
.cat-scroll::-webkit-scrollbar { height: 3px; }
.cat-scroll::-webkit-scrollbar-thumb { background: var(--bg4); }
.cat-btn {
  padding: 6px 12px; background: var(--bg3); border: 1px solid var(--line-mid); cursor: pointer;
  font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-dim); white-space: nowrap; flex-shrink: 0; transition: all .15s;
}
.cat-btn:hover { border-color: var(--text); color: var(--text); }
.cat-btn.active { background: var(--orange); color: #fff; border-color: var(--orange); }

/* ─── SEARCH ─── */
.search-row { position: relative; margin-bottom: 18px; animation: fadeUp .5s ease both; }
.search-row .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--text-dim); fill: none; pointer-events: none; transition: stroke .15s; }
.search-row:focus-within .search-icon { stroke: var(--orange); }
.search-input {
  width: 100%; padding: 12px 14px 12px 44px; height: 46px;
  border: 1px solid var(--line-mid); border-left: 3px solid var(--bg3);
  background: var(--bg); font-family: var(--mono); font-size: 13px; color: var(--text);
  outline: none; transition: border-color .15s, background .15s;
}
.search-input:focus { border-color: var(--text); border-left-color: var(--orange); background: var(--white); }
.search-input::placeholder { color: var(--text-dim); font-size: 12px; }

/* ─── TABLE (desktop) ─── */
.ind-table-wrap {
  border: 1.5px solid var(--text);
  animation: fadeUp .55s ease both;
}
.ind-table-head {
  display: grid; grid-template-columns: 1.6fr 2.5fr 1.2fr 1.4fr 1fr;
  background: var(--text); color: rgba(255,255,255,.55);
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700;
  padding: 0;
}
.ind-th { padding: 10px 14px; }
.ind-th:first-child { color: rgba(255,255,255,.8); }
.ind-th:first-child::before { content: '/ '; color: var(--orange); }
.ind-table-body { background: var(--white); }
.ind-row {
  display: grid; grid-template-columns: 1.6fr 2.5fr 1.2fr 1.4fr 1fr;
  border-bottom: 1px solid var(--line); cursor: pointer; transition: background .12s;
  animation: fadeUp .3s ease both;
}
.ind-row:last-child { border-bottom: none; }
.ind-row:hover { background: var(--orange-pale); }
.ind-td {
  padding: 10px 14px; font-family: var(--mono); font-size: 12px; color: var(--text-mid);
  display: flex; align-items: center; overflow: hidden;
}
.ind-td-name { color: var(--text); font-weight: 600; }
.ind-td-val  { color: var(--text); font-weight: 700; font-size: 13px; }
.ind-td-src  { font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: var(--mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
}
.status-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.status-badge.ok::before   { background: var(--green); }
.status-badge.ok           { color: var(--green); }
.status-badge.warn::before { background: var(--red); }
.status-badge.warn         { color: var(--red); }

/* ─── CARD LIST (mobile) — shown on small screens ─── */
.ind-cards { display: none; flex-direction: column; gap: 8px; animation: fadeUp .4s ease both; }
.ind-card {
  background: var(--white); border: 1px solid var(--line-mid); border-left: 3px solid var(--bg3);
  padding: 14px 16px; cursor: pointer; transition: border-left-color .12s, background .12s;
}
.ind-card:hover { background: var(--orange-pale); border-left-color: var(--orange); }
.ind-card.warn { border-left-color: var(--red); }
.ind-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
.ind-card-name { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); flex: 1; min-width: 0; }
.ind-card-val  { font-family: var(--sans); font-size: 16px; font-weight: 800; color: var(--text); flex-shrink: 0; }
.ind-card-bottom { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
.ind-card-src  { font-family: var(--mono); font-size: 10px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ind-card-date { font-family: var(--mono); font-size: 10px; color: var(--text-dim); flex-shrink: 0; }

/* ─── COUNT + EMPTY ─── */
.count-bar {
  font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em;
  padding: 10px 14px; border-top: 1px solid var(--line-mid); background: var(--bg2);
}
.empty-state {
  text-align: center; padding: 52px 20px;
  font-family: var(--mono); font-size: 12px; color: var(--text-dim); line-height: 1.8;
}
.empty-state strong { display: block; color: var(--text); font-size: 14px; margin-bottom: 8px; }

@media (max-width: 767px) {
  .ind-table-wrap { display: none; }
  .ind-cards { display: flex; }
}
</style>
</head>
<body>

<header>
  <a class="logo" href="cabinet.html">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L12 6M12 18L12 22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M2 12L6 12M18 12L22 12M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93" stroke-linecap="round"/></svg>
    </div>
    <div class="logo-wordmark">
      <div class="logo-text">Medeus<span>.</span></div>
      <div class="logo-sub">Medical AI</div>
    </div>
  </a>
  <nav class="header-actions desktop-nav" id="desktopNav" style="display:flex;gap:24px;align-items:center;"></nav>
  <div class="header-actions desktop-nav">
    <a href="cabinet.html" class="btn-nav-sm">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Кабинет
    </a>
  </div>
</header>

<nav class="mobile-nav" id="mobileNav"></nav>

<main class="page">
  <div class="page-header">
    <div>
      <div class="page-title-label" id="pageLabel">Все показатели</div>
      <div class="page-title" id="pageTitle">Мои показатели<span class="cursor-blink"></span></div>
    </div>
    <div class="page-meta" id="pageMeta">—</div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-card-inner">
      <div class="stat-icon"><svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <div><div class="stat-num" id="statTotal">—</div><div class="stat-lbl">Всего</div></div>
    </div></div>
    <div class="stat-card ok"><div class="stat-card-inner">
      <div class="stat-icon"><svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div><div class="stat-num" id="statNormal">—</div><div class="stat-lbl">В норме</div></div>
    </div></div>
    <div class="stat-card warn"><div class="stat-card-inner">
      <div class="stat-icon"><svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg></div>
      <div><div class="stat-num" id="statAbove">—</div><div class="stat-lbl">Выше нормы</div></div>
    </div></div>
    <div class="stat-card alert"><div class="stat-card-inner">
      <div class="stat-icon"><svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></div>
      <div><div class="stat-num" id="statBelow">—</div><div class="stat-lbl">Ниже нормы</div></div>
    </div></div>
  </div>

  <!-- Category tabs -->
  <div class="cat-scroll" id="catScroll">
    <button class="cat-btn active" data-cat="">Все группы</button>
    <button class="cat-btn" data-cat="blood">Анализы крови</button>
    <button class="cat-btn" data-cat="hormones">Гормоны</button>
    <button class="cat-btn" data-cat="functional">Биохимия</button>
    <button class="cat-btn" data-cat="oncology">Онкомаркеры</button>
    <button class="cat-btn" data-cat="infections">Иммунитет</button>
    <button class="cat-btn" data-cat="biomaterials">Биоматериалы</button>
    <button class="cat-btn" data-cat="microbiome">Микрофлора</button>
    <button class="cat-btn" data-cat="genetics">Генетика</button>
  </div>

  <!-- Status filter -->
  <div class="filter-bar">
    <span class="filter-lbl">Статус:</span>
    <button class="filter-btn active" data-filter="all"><span class="fdot fdot-all"></span>Все</button>
    <button class="filter-btn" data-filter="normal"><span class="fdot fdot-ok"></span>Норма</button>
    <button class="filter-btn" data-filter="above"><span class="fdot fdot-warn"></span>Выше нормы</button>
    <button class="filter-btn" data-filter="below"><span class="fdot fdot-alert"></span>Ниже нормы</button>
  </div>

  <!-- Search -->
  <div class="search-row">
    <svg class="search-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" type="text" id="searchInput" placeholder="Поиск по названию показателя...">
  </div>

  <!-- Desktop table -->
  <div class="ind-table-wrap">
    <div class="ind-table-head">
      <div class="ind-th">Источник</div>
      <div class="ind-th">Показатель</div>
      <div class="ind-th">Значение</div>
      <div class="ind-th">Статус</div>
      <div class="ind-th">Дата</div>
    </div>
    <div class="ind-table-body" id="tableBody">
      <div class="empty-state" style="padding:52px 20px;">
        <div class="loader-px" style="margin:0 auto 14px;"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
        <div class="loader-text">Загрузка показателей...</div>
      </div>
    </div>
    <div class="count-bar hidden" id="countLabel"></div>
  </div>

  <!-- Mobile cards -->
  <div class="ind-cards" id="mobileCards">
    <div class="empty-state">
      <div class="loader-px" style="margin:0 auto 14px;"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <div class="loader-text">Загрузка...</div>
    </div>
  </div>

</main>

<div class="status-bar">
  <div><span class="status-dot"></span>Данные актуальны · <span id="statusDate">—</span></div>
  <div style="color:rgba(255,255,255,.2)">Medeus © 2026</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script>
const PAGES=[
  {id:'cabinet',href:'cabinet.html',label:'Кабинет',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`},
  {id:'upload',href:'upload.html',label:'Анализ',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`},
  {id:'indicators',href:'indicators.html',label:'Данные',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`},
  {id:'profile',href:'profile.html',label:'Профиль',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`},
];
document.getElementById('mobileNav').innerHTML=PAGES.map(p=>`<a href="${p.href}" class="mobile-nav-item${p.id==='indicators'?' active':''}">${p.icon}${p.label}</a>`).join('');
document.getElementById('desktopNav').innerHTML=PAGES.map(p=>`<a href="${p.href}" class="desk-nav-link${p.id==='indicators'?' active':''}">${p.label}</a>`).join('');

document.getElementById('statusDate').textContent=new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});

function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(s){if(!s)return'—';const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});}
async function apiFetch(path,session){
  const r=await fetch(`${API_BASE}${path}`,{headers:{'Authorization':`Bearer ${session.access_token}`}});
  if(r.status===401){window.location.href='auth.html';return null;}
  if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json();
}

const CATEGORY_MAP={
  blood:     {label:'Анализы крови',   keys:['гемоглобин','лейкоцит','тромбоцит','соэ','эритроцит','нейтрофил','лимфоцит','моноцит','эозинофил','базофил','гематокрит','мчг','мцг','цветовой']},
  hormones:  {label:'Гормоны',         keys:['ттг','т3','т4','кортизол','тестостерон','эстрадиол','пролактин','инсулин','лг','фсг','амг','дгэа','прогестерон']},
  infections:{label:'Иммунитет',       keys:['антитела','иммуноглобулин','igm','igg','iga','игм','игг','игэ','срб','прокальцитонин','ферритин','вич','гепатит','pcr','пцр']},
  biomaterials:{label:'Биоматериалы',  keys:['моча','белок суточн','микроальбумин','эпителий','цилиндр','удельный вес']},
  genetics:  {label:'Генетика',        keys:['brca','кариотип','генотип','аллель','мутация']},
  microbiome:{label:'Микрофлора',      keys:['посев','микрофлора','дисбактер','lactobacillus','bifidobacterium','кандида']},
  oncology:  {label:'Онкомаркеры',     keys:['пса','ca-125','ca 19','рэа','афп','he4','бета-хгч','хгч']},
  functional:{label:'Биохимия',        keys:['глюкоза','hba1c','гликир','мочевая кислота','мочевин','креатинин','алт','аст','билирубин','холестерин','лпнп','лпвп','триглицерид','щелочная','амилаза','липаза']},
};

const urlParams=new URLSearchParams(location.search);
let categoryFilter=urlParams.get('category')||'';
let currentFilter='all',searchQuery='',allIndicators=[];

// Apply category from URL
function applyCategoryUI(cat){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  const catData=CATEGORY_MAP[cat];
  if(catData){
    document.getElementById('pageLabel').textContent='Показатели';
    document.getElementById('pageTitle').innerHTML=catData.label+'<span class="cursor-blink"></span>';
  } else {
    document.getElementById('pageLabel').textContent='Все показатели';
    document.getElementById('pageTitle').innerHTML='Мои показатели<span class="cursor-blink"></span>';
  }
}
applyCategoryUI(categoryFilter);

// Scroll active cat into view
setTimeout(()=>{const a=document.querySelector('.cat-btn.active');if(a)a.scrollIntoView({block:'nearest',inline:'center'});},100);

document.querySelectorAll('.cat-btn').forEach(btn=>btn.addEventListener('click',()=>{
  categoryFilter=btn.dataset.cat; applyCategoryUI(categoryFilter);
  renderStats(allIndicators); renderAll();
}));

document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{
  currentFilter=btn.dataset.filter;
  const map={all:'active',normal:'active-ok',above:'active-warn',below:'active-alert'};
  document.querySelectorAll('.filter-btn').forEach(b=>{b.className='filter-btn';});
  btn.classList.add(map[currentFilter]||'active');
  renderAll();
}));

document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value.trim();renderAll();});

function matchesCategory(ind){
  if(!categoryFilter||!CATEGORY_MAP[categoryFilter])return true;
  const keys=CATEGORY_MAP[categoryFilter].keys;
  const n=ind.name.toLowerCase();
  return keys.some(k=>n.includes(k));
}

function statusMeta(s){
  if(s==='above') return{cls:'warn',label:'↑ выше нормы'};
  if(s==='below') return{cls:'warn',label:'↓ ниже нормы'};
  if(s==='deviation') return{cls:'warn',label:'⚠ отклонение'};
  return{cls:'ok',label:'✓ норма'};
}

function getFiltered(){
  let f=allIndicators.filter(matchesCategory);
  if(currentFilter!=='all')f=f.filter(i=>i.status===currentFilter);
  if(searchQuery){const q=searchQuery.toLowerCase();f=f.filter(i=>i.name.toLowerCase().includes(q));}
  return f;
}

function renderAll(){
  const filtered=getFiltered();
  const countEl=document.getElementById('countLabel');

  if(!filtered.length){
    const empty=`<div class="empty-state"><strong>${allIndicators.length?'Ничего не найдено':'Нет данных'}</strong>${allIndicators.length?'Попробуйте изменить фильтр или категорию':'Загрузите анализы, чтобы увидеть показатели'}</div>`;
    document.getElementById('tableBody').innerHTML=empty;
    document.getElementById('mobileCards').innerHTML=empty;
    if(countEl)countEl.classList.add('hidden');
    return;
  }

  // Desktop table
  document.getElementById('tableBody').innerHTML=filtered.map((ind,i)=>{
    const{cls,label}=statusMeta(ind.status);
    return`<div class="ind-row" style="animation-delay:${Math.min(i*0.015,0.3)}s" data-ind-name="${escHtml(ind.name)}" onclick="location.href='indicator.html?name='+encodeURIComponent(this.dataset.indName)">
      <div class="ind-td ind-td-src">${escHtml(ind.source||'—')}</div>
      <div class="ind-td ind-td-name">${escHtml(ind.name)}</div>
      <div class="ind-td ind-td-val">${escHtml(ind.value)}</div>
      <div class="ind-td"><span class="status-badge ${cls}">${label}</span></div>
      <div class="ind-td">${fmtDate(ind.date)}</div>
    </div>`;
  }).join('');

  // Mobile cards
  document.getElementById('mobileCards').innerHTML=filtered.map(ind=>{
    const{cls}=statusMeta(ind.status);
    return`<div class="ind-card${cls==='warn'?' warn':''}" onclick="location.href='indicator.html?name='+encodeURIComponent('${escHtml(ind.name).replace(/'/g,"\\'")}')">
      <div class="ind-card-top">
        <div class="ind-card-name">${escHtml(ind.name)}</div>
        <div class="ind-card-val">${escHtml(ind.value)}</div>
      </div>
      <div class="ind-card-bottom">
        <span class="ind-card-src">${escHtml(ind.source||'—')}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="status-badge ${cls}" style="font-size:9px;">${statusMeta(ind.status).label}</span>
          <span class="ind-card-date">${fmtDate(ind.date)}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  if(countEl){countEl.textContent=`Показано: ${filtered.length} из ${allIndicators.length}`;countEl.classList.remove('hidden');}
}

function renderStats(indicators){
  const cf=indicators.filter(matchesCategory);
  document.getElementById('statTotal').textContent=cf.length;
  document.getElementById('statNormal').textContent=cf.filter(i=>i.status==='normal').length;
  document.getElementById('statAbove').textContent=cf.filter(i=>i.status==='above').length;
  document.getElementById('statBelow').textContent=cf.filter(i=>i.status==='below'||i.status==='deviation').length;
  document.getElementById('pageMeta').innerHTML=`Всего показателей<br><strong style="color:var(--text);font-size:14px;">${cf.length}</strong>`;
}

(async()=>{
  const session=await requireAuth();if(!session)return;
  try{
    const data=await apiFetch('/indicators',session);if(!data)return;
    allIndicators=(data.indicators||[]).sort((a,b)=>new Date(b.date)-new Date(a.date));
    renderStats(allIndicators);renderAll();
  }catch(e){
    console.error('Indicators:',e);
    const errHtml='<div class="empty-state"><strong>Ошибка загрузки</strong>Не удалось получить данные с сервера</div>';
    document.getElementById('tableBody').innerHTML=errHtml;
    document.getElementById('mobileCards').innerHTML=errHtml;
  }
})();
</script>
</body>
</html>
