<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medeus // Показатели</title>
<link rel="stylesheet" href="global.css">
<style>
  body { display: flex; flex-direction: column; }
  .page { flex:1; padding:88px 52px 64px; max-width:1260px; margin:0 auto; width:100%; position:relative; z-index:1; }

  /* ─── STAT CHIPS ─── */
  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:30px; }
  .stat-chip {
    padding:2px;
    background: var(--text);
    clip-path:polygon(12px 0%,100% 0%,100% calc(100% - 12px),calc(100% - 12px) 100%,0% 100%,0% 12px);
    animation:fadeUp 0.35s ease both;
  }
  .stat-chip:nth-child(2){animation-delay:.05s}
  .stat-chip:nth-child(3){animation-delay:.1s}
  .stat-chip:nth-child(4){animation-delay:.15s}
  .stat-chip-inner {
    background: var(--white);
    clip-path:polygon(10px 0%,100% 0%,100% calc(100% - 10px),calc(100% - 10px) 100%,0% 100%,0% 10px);
    padding:22px 20px; display:flex; align-items:center; gap:16px;
  }
  .stat-chip-icon { width:40px; height:40px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:var(--bg3); clip-path:polygon(6px 0%,100% 0%,100% calc(100% - 6px),calc(100% - 6px) 100%,0% 100%,0% 6px); }
  .stat-chip-icon svg { width:18px; height:18px; stroke:var(--text-dim); fill:none; }
  .stat-chip.ok  .stat-chip-icon { background:var(--green-pale); }
  .stat-chip.ok  .stat-chip-icon svg { stroke:var(--green); }
  .stat-chip.warn .stat-chip-icon { background:var(--yellow-pale); }
  .stat-chip.warn .stat-chip-icon svg { stroke:var(--yellow); }
  .stat-chip.alert .stat-chip-icon { background:var(--red-pale); }
  .stat-chip.alert .stat-chip-icon svg { stroke:var(--red); }
  .stat-chip-info {}
  .stat-chip-num { font-family:var(--sans); font-size:28px; font-weight:700; color:var(--text); letter-spacing:-1px; line-height:1; }
  .stat-chip.ok   .stat-chip-num { color:var(--green); }
  .stat-chip.warn .stat-chip-num { color:var(--yellow); }
  .stat-chip.alert .stat-chip-num { color:var(--red); }
  .stat-chip-label { font-family:var(--mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-dim); margin-top:4px; line-height:1.4; }

  /* ─── FILTERS ─── */
  .filters { display:flex; align-items:center; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
  .filter-label { font-family:var(--mono); font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-dim); margin-right:4px; }
  .filter-btn {
    display:inline-flex; align-items:center; gap:7px;
    padding:7px 16px; background:transparent; color:var(--text-dim);
    font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase;
    border:1px solid var(--line-mid); outline:none; cursor:pointer; transition:all 0.15s;
    clip-path:polygon(7px 0%,100% 0%,100% calc(100% - 7px),calc(100% - 7px) 100%,0% 100%,0% 7px);
  }
  .filter-btn:hover { background:var(--bg3); border-color:var(--text-mid); color:var(--text); }
  .filter-dot { width:7px; height:7px; flex-shrink:0; }
  .dot-all   { background:var(--text-dim); }
  .dot-ok    { background:var(--green); }
  .dot-warn  { background:var(--yellow); }
  .dot-alert { background:var(--red); }
  .filter-btn.active       { background:var(--text); border-color:var(--text); color:#fff; }
  .filter-btn.active .dot-all { background:#fff; }
  .filter-btn.active-ok    { background:var(--green-pale); border-color:var(--green); color:var(--green); }
  .filter-btn.active-warn  { background:var(--yellow-pale); border-color:var(--yellow); color:var(--yellow); }
  .filter-btn.active-alert { background:var(--red-pale); border-color:var(--red); color:var(--red); }

  /* ─── SEARCH ─── */
  .search-wrap { position:relative; margin-bottom:22px; }
  .search-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); width:16px; height:16px; stroke:var(--text-dim); fill:none; pointer-events:none; }
  .search-input { width:100%; padding:14px 16px 14px 46px; height:50px; border:1px solid var(--line-mid); border-left:3px solid var(--bg3); background:var(--white); font-family:var(--mono); font-size:13px; color:var(--text); outline:none; transition:border-color 0.15s,border-left-color 0.15s; }
  .search-input:focus { border-color:var(--text); border-left-color:var(--orange); }
  .search-input::placeholder { color:var(--text-dim); }

  /* ─── TABLE ─── */
  .table-outer { background:var(--text); clip-path:polygon(20px 0%,100% 0%,100% calc(100% - 20px),calc(100% - 20px) 100%,0% 100%,0% 20px); padding:2px; }
  .table-inner { background:var(--white); clip-path:polygon(18px 0%,100% 0%,100% calc(100% - 18px),calc(100% - 18px) 100%,0% 100%,0% 18px); overflow:hidden; }
  .table-head {
    display:grid; grid-template-columns:2fr 1fr 1.2fr 1fr 1.2fr;
    background:var(--bg2); border-bottom:1px solid var(--line-mid);
    padding:0;
  }
  .table-head > div { font-family:var(--mono); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-dim); padding:13px 18px; font-weight:700; }
  .table-head > div:first-child::before { content:'/ '; color:var(--orange); }
  .table-body { overflow-y:auto; max-height:580px; }
  .table-row {
    display:grid; grid-template-columns:2fr 1fr 1.2fr 1fr 1.2fr;
    border-bottom:1px solid var(--line); transition:background 0.12s;
    animation:fadeUp 0.3s ease both;
  }
  .table-row:last-child { border-bottom:none; }
  .table-row:hover { background:var(--bg); }
  .table-row > div { font-family:var(--mono); font-size:12px; padding:13px 18px; display:flex; align-items:center; }
  .col-name { font-weight:600; color:var(--text); }
  .col-value { color:var(--text); font-weight:500; }
  .col-status { gap:8px; }
  .col-status.ok    { color:var(--green); }
  .col-status.warn  { color:var(--yellow); }
  .col-status.alert { color:var(--red); }
  .status-dot { width:6px; height:6px; background:currentColor; flex-shrink:0; }
  .col-date, .col-source { color:var(--text-dim); font-size:11px; }
  .count-label { font-family:var(--mono); font-size:10px; color:var(--text-dim); padding:11px 20px; border-top:1px solid var(--line); letter-spacing:0.05em; }
  .count-label.hidden { display:none; }

  .card-loader { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:60px 24px; }
  .card-loader.hidden { display:none; }

  .empty-state { font-family:var(--mono); text-align:center; padding:52px 24px; color:var(--text-dim); font-size:12px; letter-spacing:0.05em; line-height:1.8; }
  .empty-state strong { display:block; font-size:13px; margin-bottom:8px; color:var(--text-mid); }

  @media (max-width:960px) {
    .page { padding:78px 28px 52px; }
    .stats-row { grid-template-columns:1fr 1fr; }
    .table-head, .table-row { grid-template-columns:2fr 1fr 1.2fr; }
    .table-head > div:nth-child(4), .table-head > div:nth-child(5),
    .table-row > div:nth-child(4), .table-row > div:nth-child(5) { display:none; }
  }
  @media (max-width:540px) {
    .stats-row { grid-template-columns:1fr 1fr; }
    .filters { gap:5px; }
    .table-head, .table-row { grid-template-columns:1fr auto 1fr; }
    .table-head > div:nth-child(3), .table-row > div:nth-child(3) { display:flex; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="cabinet.html">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2L12 6M12 18L12 22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M2 12L6 12M18 12L22 12M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93"/>
      </svg>
    </div>
    <div class="logo-wordmark">
      <div class="logo-text">Medeus<span>.</span></div>
      <div class="logo-sub">Medical AI</div>
    </div>
  </a>
  <div class="header-right">
    <a href="cabinet.html" class="btn-nav btn-ghost">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Кабинет
    </a>
    <button class="btn-nav btn-danger" id="logoutBtn">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Выйти
    </button>
  </div>
</header>

<main class="page">
  <div class="page-header">
    <div>
      <div class="page-title-label">Личный кабинет</div>
      <div class="page-title">Все показатели<span class="cursor-blink"></span></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-chip">
      <div class="stat-chip-inner">
        <div class="stat-chip-icon"><svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
        <div class="stat-chip-info"><div class="stat-chip-num" id="statTotal">—</div><div class="stat-chip-label">Всего показателей</div></div>
      </div>
    </div>
    <div class="stat-chip ok">
      <div class="stat-chip-inner">
        <div class="stat-chip-icon"><svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div class="stat-chip-info"><div class="stat-chip-num" id="statNormal">—</div><div class="stat-chip-label">В норме</div></div>
      </div>
    </div>
    <div class="stat-chip warn">
      <div class="stat-chip-inner">
        <div class="stat-chip-icon"><svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></div>
        <div class="stat-chip-info"><div class="stat-chip-num" id="statAbove">—</div><div class="stat-chip-label">Выше нормы</div></div>
      </div>
    </div>
    <div class="stat-chip alert">
      <div class="stat-chip-inner">
        <div class="stat-chip-icon"><svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
        <div class="stat-chip-info"><div class="stat-chip-num" id="statBelow">—</div><div class="stat-chip-label">Ниже нормы</div></div>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <span class="filter-label">Фильтр:</span>
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')"><span class="filter-dot dot-all"></span>Все</button>
    <button class="filter-btn" data-filter="normal" onclick="setFilter('normal')"><span class="filter-dot dot-ok"></span>Норма</button>
    <button class="filter-btn" data-filter="above" onclick="setFilter('above')"><span class="filter-dot dot-warn"></span>Выше нормы</button>
    <button class="filter-btn" data-filter="below" onclick="setFilter('below')"><span class="filter-dot dot-alert"></span>Ниже нормы</button>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" type="text" id="searchInput" placeholder="Поиск по названию показателя...">
  </div>

  <!-- Table -->
  <div class="table-outer">
    <div class="table-inner">
      <div class="table-head">
        <div>Показатель</div>
        <div>Значение</div>
        <div>Статус</div>
        <div>Дата</div>
        <div>Источник</div>
      </div>
      <div class="table-body" id="tableBody">
        <div class="card-loader" id="loader">
          <div class="loader-px"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
          <div class="loader-text">Загрузка показателей...</div>
        </div>
      </div>
      <div class="count-label hidden" id="countLabel"></div>
    </div>
  </div>
</main>

<div class="status-bar">
  <div><span class="status-bar-dot"></span>Данные актуальны · <span id="statusDate">—</span></div>
  <div class="status-bar-right">Medeus © 2026</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script>
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(s){if(!s)return'—';const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});}
async function apiFetch(path,session){const r=await fetch(`${API_BASE}${path}`,{headers:{'Authorization':`Bearer ${session.access_token}`}});if(r.status===401){window.location.href='auth.html';return null;}if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json();}

document.getElementById('statusDate').textContent=new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});

let allIndicators=[],currentFilter='all',searchQuery='';

function statusMeta(s){if(s==='above')return{cls:'warn',label:'↑ выше нормы'};if(s==='below')return{cls:'alert',label:'↓ ниже нормы'};return{cls:'ok',label:'✓ норма'};}

function renderTable(){
  const body=document.getElementById('tableBody'),countEl=document.getElementById('countLabel'),loader=document.getElementById('loader');
  if(loader)loader.classList.add('hidden');
  let filtered=allIndicators;
  if(currentFilter!=='all')filtered=filtered.filter(i=>i.status===currentFilter);
  if(searchQuery){const q=searchQuery.toLowerCase();filtered=filtered.filter(i=>i.name.toLowerCase().includes(q));}
  if(!filtered.length){body.innerHTML=`<div class="empty-state"><strong>${allIndicators.length?'Ничего не найдено':'Нет данных'}</strong>${allIndicators.length?'Попробуйте изменить фильтр':'Загрузите анализы, чтобы увидеть показатели'}</div>`;if(countEl){countEl.textContent='';countEl.classList.add('hidden');}return;}
  body.innerHTML=filtered.map((ind,idx)=>{const{cls,label}=statusMeta(ind.status);return`<div class="table-row" style="animation-delay:${Math.min(idx*0.02,0.4)}s"><div class="col-name">${escHtml(ind.name)}</div><div class="col-value">${escHtml(ind.value)}</div><div class="col-status ${cls}"><span class="status-dot"></span>${label}</div><div class="col-date">${fmtDate(ind.date)}</div><div class="col-source">${escHtml(ind.source||'—')}</div></div>`;}).join('');
  if(countEl){countEl.textContent=`Показано: ${filtered.length} из ${allIndicators.length}`;countEl.classList.remove('hidden');}
}

function renderStats(indicators){
  document.getElementById('statTotal').textContent=indicators.length;
  document.getElementById('statNormal').textContent=indicators.filter(i=>i.status==='normal').length;
  document.getElementById('statAbove').textContent=indicators.filter(i=>i.status==='above').length;
  document.getElementById('statBelow').textContent=indicators.filter(i=>i.status==='below').length;
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.className='filter-btn';
    if(btn.dataset.filter===f)btn.classList.add(f==='all'?'active':f==='normal'?'active-ok':f==='above'?'active-warn':'active-alert');
  });
  renderTable();
}

document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value.trim();renderTable();});
document.getElementById('logoutBtn')?.addEventListener('click',async e=>{e.preventDefault();await signOut();});

(async()=>{
  const session=await requireAuth();if(!session)return;
  try{
    const data=await apiFetch('/indicators',session);if(!data)return;
    allIndicators=data.indicators||[];renderStats(allIndicators);renderTable();
  }catch(e){
    console.error('Indicators:',e);
    const loader=document.getElementById('loader');if(loader)loader.innerHTML='<div class="loader-text" style="color:var(--red)">Ошибка загрузки данных</div>';
  }
})();
</script>
</body>
</html>
