<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medeus // Рекомендации</title>
<link rel="stylesheet" href="global.css">
<style>
  body { display: flex; flex-direction: column; }
  .page { flex:1; padding:88px 52px 64px; max-width:1100px; margin:0 auto; width:100%; position:relative; z-index:1; }

  .search-wrap { position:relative; margin-bottom:28px; }
  .search-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); width:16px; height:16px; stroke:var(--text-dim); fill:none; pointer-events:none; }
  .search-input { width:100%; padding:14px 16px 14px 46px; height:50px; border:1px solid var(--line-mid); border-left:3px solid var(--bg3); background:var(--white); font-family:var(--mono); font-size:13px; color:var(--text); outline:none; transition:border-color 0.15s,border-left-color 0.15s; }
  .search-input:focus { border-color:var(--text); border-left-color:var(--orange); }
  .search-input::placeholder { color:var(--text-dim); }

  .list-card-wrap { background:var(--text); clip-path:polygon(20px 0%,100% 0%,100% calc(100% - 20px),calc(100% - 20px) 100%,0% 100%,0% 20px); padding:2px; }
  .list-card { background:var(--white); clip-path:polygon(18px 0%,100% 0%,100% calc(100% - 18px),calc(100% - 18px) 100%,0% 100%,0% 18px); }

  .recs-list { display:flex; flex-direction:column; }
  .rec-item { display:flex; gap:16px; align-items:flex-start; padding:18px 24px; border-bottom:1px solid var(--line); animation:fadeUp 0.3s ease both; transition:background 0.15s; }
  .rec-item:last-child { border-bottom:none; }
  .rec-item:hover { background:var(--bg); }
  .rec-icon { width:36px; height:36px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px; background:var(--bg2); clip-path:polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px); }
  .rec-content { flex:1; }
  .rec-desc { font-family:var(--mono); font-size:12px; color:var(--text-mid); line-height:1.8; letter-spacing:0.02em; }
  .rec-tag { display:inline-block; margin-top:8px; font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; padding:3px 9px; background:var(--bg3); color:var(--text-dim); }

  .recs-empty { font-family:var(--mono); padding:52px 24px; text-align:center; font-size:12px; color:var(--text-dim); letter-spacing:0.05em; }
  .count-label { font-family:var(--mono); font-size:10px; color:var(--text-dim); padding:11px 24px; border-top:1px solid var(--line); letter-spacing:0.05em; }
  .count-label.hidden { display:none; }

  .card-loader { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:60px 24px; }
  .card-loader.hidden { display:none; }

  @media (max-width:640px) { .page { padding:78px 18px 52px; } }
</style>
</head>
<body>

<header>
  <a class="logo" href="cabinet.html">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2L12 6M12 18L12 22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M2 12L6 12M18 12L22 12M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93"/>
      </svg>
    </div>
    <div class="logo-wordmark">
      <div class="logo-text">Medeus<span>.</span></div>
      <div class="logo-sub">Medical AI</div>
    </div>
  </a>
  <div class="header-right">
    <a href="cabinet.html" class="btn-nav btn-ghost">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Кабинет
    </a>
  </div>
</header>

<main class="page">
  <div class="page-header">
    <div>
      <div class="page-title-label">Личный кабинет</div>
      <div class="page-title">Рекомендации<span class="cursor-blink"></span></div>
    </div>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" type="text" id="searchInput" placeholder="Поиск по тексту рекомендации...">
  </div>

  <div class="list-card-wrap">
    <div class="list-card">
      <div class="recs-list" id="recsList">
        <div class="card-loader" id="loader">
          <div class="loader-px"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
          <div class="loader-text">Загрузка рекомендаций...</div>
        </div>
      </div>
      <div class="count-label hidden" id="countLabel"></div>
    </div>
  </div>
</main>

<div class="status-bar">
  <div><span class="status-bar-dot"></span>Все рекомендации · <span id="statusDate">—</span></div>
  <div class="status-bar-right">Medeus © 2026</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script>
const REC_ICONS=['🩺','🥗','🏃','💊','🧪','🫀','🧘','💧','🌿','🔬','🍎','🛌','🧬','❤️','🩻'];
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
async function apiFetch(path,session){const r=await fetch(`${API_BASE}${path}`,{headers:{'Authorization':`Bearer ${session.access_token}`}});if(r.status===401){window.location.href='auth.html';return null;}if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json();}
document.getElementById('statusDate').textContent=new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});
let allRecs=[];

function renderList(recs){
  const list=document.getElementById('recsList'),countEl=document.getElementById('countLabel'),loader=document.getElementById('loader');
  if(loader)loader.classList.add('hidden');
  if(!recs.length){list.innerHTML='<div class="recs-empty">Ничего не найдено</div>';if(countEl)countEl.classList.add('hidden');return;}
  list.innerHTML=recs.map((rec,i)=>`<div class="rec-item" style="animation-delay:${Math.min(i*0.025,0.5)}s"><div class="rec-icon">${REC_ICONS[i%REC_ICONS.length]}</div><div class="rec-content"><div class="rec-desc">${escHtml(rec.text)}</div><span class="rec-tag">${escHtml(rec.source)}</span></div></div>`).join('');
  if(countEl){countEl.textContent=`Всего: ${recs.length}`;countEl.classList.remove('hidden');}
}

document.getElementById('searchInput').addEventListener('input',e=>{const q=e.target.value.trim().toLowerCase();renderList(q?allRecs.filter(r=>r.text.toLowerCase().includes(q)):allRecs);});

(async()=>{
  const session=await requireAuth();if(!session)return;
  try{const data=await apiFetch('/recommendations',session);if(!data)return;allRecs=data.recommendations||[];renderList(allRecs);}
  catch(e){document.getElementById('loader').innerHTML='<div class="loader-text" style="color:var(--red)">Ошибка загрузки</div>';}
})();
</script>
</body>
</html>
