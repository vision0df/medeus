<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Medeus // Рекомендации</title>
  <!-- PWA / iOS Home Screen -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#18150F">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Medeus">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="global.css">
<style>
body{display:flex;flex-direction:column;min-height:100vh;}
.desk-nav-link{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text-mid);text-decoration:none;padding:6px 0;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
.desk-nav-link:hover{color:var(--text);}
.desk-nav-link.active{color:var(--orange);border-bottom-color:var(--orange);}
.btn-nav-sm{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--bg3);border:none;cursor:pointer;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mid);text-decoration:none;transition:all .15s;clip-path:var(--clip-sm);}
.btn-nav-sm:hover{background:var(--text);color:#fff;}

.search-row{position:relative;margin-bottom:20px;animation:fadeUp .4s ease both;}
.search-row .sico{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--text-dim);fill:none;pointer-events:none;transition:stroke .15s;}
.search-row:focus-within .sico{stroke:var(--orange);}
.search-inp{width:100%;padding:12px 14px 12px 44px !important;height:46px;border:1px solid var(--line-mid);border-left:3px solid var(--bg3);background:var(--bg);font-family:var(--mono);font-size:13px;color:var(--text);outline:none;transition:border-color .15s,background .15s;}
.search-inp:focus{border-color:var(--text);border-left-color:var(--orange);background:var(--white);}
.search-inp::placeholder{color:var(--text-dim);font-size:12px;}

.recs-grid{display:grid;grid-template-columns:1fr;gap:10px;animation:fadeUp .45s ease both;}
@media(min-width:640px){.recs-grid{grid-template-columns:1fr 1fr;}}
@media(min-width:1024px){.recs-grid{grid-template-columns:repeat(3,1fr);}}

.rec-card{background:var(--white);border:1.5px solid var(--line-mid);border-left:3px solid var(--bg3);padding:16px 18px 14px;transition:border-left-color .15s,background .15s;animation:fadeUp .35s ease both;}
.rec-card:hover{background:var(--orange-pale);border-left-color:var(--orange);}
.rec-card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;}
.rec-emoji{font-size:22px;line-height:1;flex-shrink:0;margin-top:1px;}
.rec-text{font-family:var(--mono);font-size:12px;color:var(--text-mid);line-height:1.7;flex:1;}
.rec-source{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);padding:3px 8px;background:var(--bg3);display:inline-block;}

.count-bar{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:.1em;margin-top:14px;padding-top:12px;border-top:1px solid var(--line-mid);}
.empty-state{text-align:center;padding:52px 20px;font-family:var(--mono);font-size:12px;color:var(--text-dim);line-height:1.8;}
.empty-state strong{display:block;color:var(--text);font-size:14px;margin-bottom:8px;}
.state-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:60px 20px;}
</style>
</head>
<body>
<header>
  <a class="logo" href="cabinet.html">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2L12 6M12 18L12 22M4.93 4.93L7.76 7.76M16.24 16.24L19.07 19.07M2 12L6 12M18 12L22 12M4.93 19.07L7.76 16.24M16.24 7.76L19.07 4.93" stroke-linecap="round"/></svg></div>
    <div class="logo-wordmark"><div class="logo-text">Medeus<span>.</span></div><div class="logo-sub">Medical AI</div></div>
  </a>
  <nav class="header-actions desktop-nav" id="desktopNav" style="display:flex;gap:24px;align-items:center;"></nav>
  <div class="header-actions desktop-nav">
    <a href="cabinet.html" class="btn-nav-sm">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" width="13" height="13"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Кабинет
    </a>
  </div>
</header>
<nav class="mobile-nav" id="mobileNav"></nav>

<main class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Рекомендации<span class="cursor-blink"></span></div>
    </div>
    
  </div>

  <div class="search-row">
    <svg class="sico" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-inp" type="text" id="searchInput" placeholder="Поиск по тексту рекомендации...">
  </div>

  <div id="recsContent">
    <div class="state-loader">
      <div class="loader-px"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <div class="loader-text">Загрузка рекомендаций...</div>
    </div>
  </div>
</main>

<div class="status-bar">
  <div><span class="status-dot"></span>Рекомендации ИИ · <span id="statusDate">—</span></div>
  <div style="color:rgba(255,255,255,.2)">Medeus © 2026</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabase.js"></script>
<script>
const PAGES=[
  {id:'cabinet',href:'cabinet.html',label:'Кабинет',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`},
  {id:'upload',href:'upload.html',label:'Анализ',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`},
  {id:'indicators',href:'indicators.html',label:'Данные',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`},
  {id:'profile',href:'profile.html',label:'Профиль',icon:`<svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`},
];
document.getElementById('mobileNav').innerHTML=PAGES.map(p=>`<a href="${p.href}" class="mobile-nav-item">${p.icon}${p.label}</a>`).join('');
document.getElementById('desktopNav').innerHTML=PAGES.map(p=>`<a href="${p.href}" class="desk-nav-link">${p.label}</a>`).join('');
document.getElementById('statusDate').textContent=new Date().toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'});

const REC_ICONS=['🩺','🥗','🏃','💊','🧪','🫀','🧘','💧','🌿','🔬','🍎','🛌','🧬','❤️','🩻'];
function escHtml(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let allRecs=[],searchQ='';

function renderList(){
  const q=searchQ.toLowerCase();
  const filtered=q?allRecs.filter(r=>r.text.toLowerCase().includes(q)):allRecs;
  const content=document.getElementById('recsContent');
  const meta=document.getElementById('pageMeta');
  if(meta)meta.innerHTML=`Найдено рекомендаций<br><strong style="color:var(--text);font-size:14px;">${filtered.length}</strong>`;
  if(!filtered.length){
    content.innerHTML=`<div class="empty-state"><strong>${allRecs.length?'Ничего не найдено':'Рекомендаций пока нет'}</strong>${allRecs.length?'Попробуйте другой поиск':'Рекомендации появятся после загрузки анализов'}</div>`;
    return;
  }
  content.innerHTML=`<div class="recs-grid">${filtered.map((rec,i)=>`
    <div class="rec-card" style="animation-delay:${Math.min(i*0.025,0.4)}s">
      <div class="rec-card-top">
        <div class="rec-emoji">${REC_ICONS[i%REC_ICONS.length]}</div>
        <div class="rec-text">${escHtml(rec.text)}</div>
      </div>
      <span class="rec-source">${escHtml(rec.source||'—')}</span>
    </div>`).join('')}</div>
  <div class="count-bar">Рекомендаций: ${filtered.length}${q?' из '+allRecs.length:''}</div>`;
}

document.getElementById('searchInput').addEventListener('input',e=>{searchQ=e.target.value.trim();renderList();});

(async()=>{
  const session=await requireAuth();if(!session)return;
  try{
    const r=await fetch(`${API_BASE}/recommendations`,{headers:{'Authorization':`Bearer ${session.access_token}`}});
    if(r.status===401){window.location.href='auth.html';return;}
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    allRecs=data.recommendations||[];
    renderList();
  }catch(e){
    document.getElementById('recsContent').innerHTML=`<div class="empty-state"><strong>Ошибка загрузки</strong>${escHtml(e.message)}</div>`;
  }
})();
</script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
