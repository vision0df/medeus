<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medeus // Личный кабинет</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF5A00;
    --orange-dim: #CC4800;
    --orange-pale: rgba(255,90,0,0.08);
    --orange-border: rgba(255,90,0,0.3);
    --bg: #F2F1EE;
    --bg2: #ECEAE6;
    --bg3: #E4E2DE;
    --white: #ffffff;
    --text: #1A1714;
    --text-mid: #5A5650;
    --text-dim: #8C8480;
    --line: rgba(0,0,0,0.1);
    --green: #2E9E5B;
    --green-pale: rgba(46,158,91,0.08);
    --red: #D93535;
    --red-pale: rgba(217,53,53,0.08);
    --yellow: #C89000;
    --yellow-pale: rgba(200,144,0,0.08);
    --mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.06) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none; z-index: 0;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes barGrow { from{width:0} to{width:var(--w)} }

  /* ─── HEADER ─── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px; height: 56px;
    background: var(--white); border-bottom: 2px solid var(--text);
  }

  .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .logo-icon {
    width: 30px; height: 30px; background: var(--orange);
    display: flex; align-items: center; justify-content: center;
    clip-path: polygon(6px 0%,100% 0%,100% calc(100% - 6px),calc(100% - 6px) 100%,0% 100%,0% 6px);
  }
  .logo-icon svg { width: 14px; height: 14px; }
  .logo-text { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: 0.1em; text-transform: uppercase; }
  .logo-text span { color: var(--orange); }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .user-badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-mid);
    letter-spacing: 0.08em;
  }
  .user-avatar {
    width: 28px; height: 28px;
    background: var(--text); color: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    clip-path: polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px);
  }

  .btn-sm {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; background: var(--bg2);
    color: var(--text-mid); border: 1px solid var(--line);
    font-family: var(--mono); font-size: 11px; font-weight: 400;
    letter-spacing: 0.08em; text-transform: uppercase;
    text-decoration: none; cursor: pointer; outline: none;
    transition: background 0.15s, color 0.15s; white-space: nowrap;
  }
  .btn-sm:hover { background: var(--bg3); color: var(--text); }
  .btn-sm svg { width: 12px; height: 12px; stroke: currentColor; fill: none; flex-shrink: 0; }

  .btn-primary-sm {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; background: var(--text); color: var(--white);
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    text-decoration: none; cursor: pointer; border: none; outline: none;
    transition: background 0.15s; white-space: nowrap;
    clip-path: polygon(7px 0%,100% 0%,100% calc(100% - 7px),calc(100% - 7px) 100%,0% 100%,0% 7px);
  }
  .btn-primary-sm:hover { background: var(--orange); }
  .btn-primary-sm svg { width: 12px; height: 12px; stroke: currentColor; fill: none; flex-shrink: 0; }

  /* ─── LAYOUT ─── */
  .page {
    flex: 1;
    padding: 80px 48px 60px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    position: relative; z-index: 1;
  }

  /* page header row */
  .page-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 2px solid var(--text);
    animation: fadeIn 0.3s ease both;
  }

  .page-title-label {
    font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--orange); margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .page-title-label::before { content: '/'; font-weight: 700; }

  .page-title {
    font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: var(--text);
    display: flex; align-items: center; gap: 10px;
  }

  .cursor-blink {
    display: inline-block; width: 10px; height: 1.1em;
    background: var(--orange); vertical-align: text-bottom;
    animation: blink 0.9s step-end infinite;
  }

  .page-meta { font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; text-align: right; line-height: 1.7; }

  /* ─── DASHBOARD GRID ─── */
  .dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 20px;
  }

  /* Full-width block */
  .col-full { grid-column: 1 / -1; }

  /* ─── CARD ─── */
  .card-wrap {
    background: var(--text);
    clip-path: polygon(18px 0%,100% 0%,100% calc(100% - 18px),calc(100% - 18px) 100%,0% 100%,0% 18px);
    padding: 2px;
    animation: fadeIn 0.4s ease both;
  }
  .card-wrap:nth-child(2) { animation-delay: 0.05s; }
  .card-wrap:nth-child(3) { animation-delay: 0.10s; }
  .card-wrap:nth-child(4) { animation-delay: 0.15s; }
  .card-wrap:nth-child(5) { animation-delay: 0.20s; }

  .card {
    background: var(--white);
    clip-path: polygon(16px 0%,100% 0%,100% calc(100% - 16px),calc(100% - 16px) 100%,0% 100%,0% 16px);
    padding: 0;
    height: 100%;
    display: flex; flex-direction: column;
  }

  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--bg2);
  }

  .card-label {
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-dim); display: flex; align-items: center; gap: 6px;
  }
  .card-label::before { content: '/'; color: var(--orange); font-weight: 700; font-size: 12px; }

  .card-badge {
    font-size: 9px; font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; padding: 3px 8px;
  }
  .badge-ok { background: var(--green-pale); color: var(--green); }
  .badge-warn { background: var(--yellow-pale); color: var(--yellow); }
  .badge-alert { background: var(--red-pale); color: var(--red); }
  .badge-neutral { background: var(--bg3); color: var(--text-dim); }

  .card-body { padding: 24px; flex: 1; }

  /* ─── BLOCK 1: СВОДКА АНАЛИЗОВ ─── */
  .summary-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    margin-bottom: 20px;
  }

  .summary-item {
    background: var(--bg); padding: 14px 16px;
    border-left: 3px solid var(--line);
    transition: border-color 0.15s;
  }
  .summary-item.ok   { border-left-color: var(--green); }
  .summary-item.warn { border-left-color: var(--yellow); }
  .summary-item.alert{ border-left-color: var(--red); }

  .summary-item-name {
    font-size: 10px; font-weight: 400; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 6px;
  }

  .summary-item-val {
    font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.5px;
  }
  .summary-item-val span { font-size: 11px; font-weight: 400; color: var(--text-dim); margin-left: 3px; }

  .summary-item-status {
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px;
  }
  .summary-item-status.ok   { color: var(--green); }
  .summary-item-status.warn { color: var(--yellow); }
  .summary-item-status.alert{ color: var(--red); }

  .summary-footer {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 10px; color: var(--text-dim); letter-spacing: 0.05em;
    padding-top: 16px; border-top: 1px solid var(--line);
  }

  /* ─── BLOCK 2: ЗАГРУЖЕННЫЕ АНАЛИЗЫ ─── */
  .analyses-list { display: flex; flex-direction: column; gap: 8px; }

  .analysis-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; background: var(--bg);
    transition: background 0.15s; cursor: pointer;
  }
  .analysis-row:hover { background: var(--bg2); }

  .analysis-icon {
    width: 34px; height: 34px; flex-shrink: 0;
    background: var(--bg3); display: flex; align-items: center; justify-content: center;
    clip-path: polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px);
    position: relative; transition: background 0.15s;
  }
  .analysis-row:hover .analysis-icon { background: var(--orange); }
  .analysis-row:hover .analysis-icon svg { stroke: var(--white); }
  .analysis-icon svg { width: 15px; height: 15px; stroke: var(--text-dim); fill: none; transition: stroke 0.15s; }

  .analysis-info { flex: 1; min-width: 0; }
  .analysis-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .analysis-meta { font-size: 10px; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.03em; }

  .analysis-status {
    font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 3px 8px; flex-shrink: 0;
  }

  .analysis-arrow { color: var(--text-dim); flex-shrink: 0; }
  .analysis-arrow svg { width: 14px; height: 14px; stroke: currentColor; fill: none; }

  .analyses-empty {
    text-align: center; padding: 32px 16px;
    font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; line-height: 1.7;
  }

  /* ─── BLOCK 3: РЕКОМЕНДАЦИИ ─── */
  .recs-list { display: flex; flex-direction: column; gap: 12px; }

  .rec-item {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px 16px; background: var(--bg);
  }

  .rec-icon {
    width: 32px; height: 32px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    background: var(--bg2);
    clip-path: polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0% 100%,0% 5px);
  }

  .rec-content { flex: 1; }
  .rec-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .rec-desc { font-size: 11px; color: var(--text-dim); line-height: 1.6; letter-spacing: 0.02em; }
  .rec-tag {
    display: inline-block; margin-top: 6px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 2px 7px;
  }

  /* ─── BLOCK 4: ОБЩЕЕ СОСТОЯНИЕ ─── */
  .health-score-wrap {
    display: flex; align-items: center; gap: 24px; margin-bottom: 24px;
  }

  .health-score-circle {
    width: 90px; height: 90px; flex-shrink: 0;
    background: var(--text);
    clip-path: polygon(14px 0%,100% 0%,100% calc(100% - 14px),calc(100% - 14px) 100%,0% 100%,0% 14px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px;
  }
  .health-score-num {
    font-size: 28px; font-weight: 700; color: var(--white); letter-spacing: -1px; line-height: 1;
  }
  .health-score-label {
    font-size: 9px; color: rgba(255,255,255,0.5); letter-spacing: 0.15em; text-transform: uppercase;
  }

  .health-score-info { flex: 1; }
  .health-score-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .health-score-desc { font-size: 11px; color: var(--text-dim); line-height: 1.6; }

  /* health bars */
  .health-bars { display: flex; flex-direction: column; gap: 10px; }

  .health-bar-row { display: flex; flex-direction: column; gap: 4px; }

  .health-bar-top {
    display: flex; justify-content: space-between; align-items: center;
  }
  .health-bar-name { font-size: 10px; color: var(--text-mid); letter-spacing: 0.08em; text-transform: uppercase; }
  .health-bar-val { font-size: 10px; font-weight: 700; color: var(--text); }

  .health-bar-track {
    height: 6px; background: var(--bg3); position: relative; overflow: hidden;
  }
  .health-bar-fill {
    position: absolute; top: 0; left: 0; height: 100%;
    background: var(--orange);
    animation: barGrow 0.8s ease both;
  }
  .health-bar-fill.ok   { background: var(--green); }
  .health-bar-fill.warn { background: var(--yellow); }
  .health-bar-fill.alert{ background: var(--red); }

  /* ─── STATUS BAR ─── */
  .status-bar {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px; height: 36px;
    background: var(--text);
    color: rgba(255,255,255,0.45);
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
  }
  .status-bar-dot {
    display: inline-block; width: 5px; height: 5px;
    background: var(--orange); margin-right: 6px;
    animation: blink 1.4s step-end infinite;
  }
  .status-bar-right { color: rgba(255,255,255,0.3); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 900px) {
    header { padding: 0 24px; }
    .page { padding: 72px 20px 48px; }
    .dashboard { grid-template-columns: 1fr; }
    .col-full { grid-column: auto; }
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .status-bar { padding: 0 24px; }
  }
  @media (max-width: 500px) {
    .summary-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<script>
const API_BASE = 'https://medeus.onrender.com';

document.getElementById('statusDate').textContent =
  new Date().toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function plural(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
  return many;
}

// ─── Парсим строки результата вида "Название - значение - статус" ───
function parseResultLines(text) {
  const lines = text.split('\n');
  const indicators = [];
  for (const line of lines) {
    const match = line.match(/^(.+?)\s*[-–]\s*(.+?)\s*[-–]\s*(норма|выше нормы|ниже нормы)/i);
    if (match) {
      indicators.push({
        name:   match[1].trim(),
        value:  match[2].trim(),
        status: match[3].trim().toLowerCase(),
      });
    }
  }
  return indicators;
}

// ─── Группируем анализы: если одинаковый filename — берём самый новый ───
function deduplicateByFilename(rows) {
  const map = new Map();
  for (const row of rows) {
    const key = row.filename || row.id;
    if (!map.has(key)) {
      map.set(key, row);
    } else {
      const existing = new Date(map.get(key).created_at);
      const current  = new Date(row.created_at);
      if (current > existing) map.set(key, row);
    }
  }
  return Array.from(map.values()).sort((a, b) =>
    new Date(b.created_at) - new Date(a.created_at)
  );
}

// ─── Рендерим сводку показателей из всех анализов ───
function renderSummary(rows) {
  const grid = document.getElementById('summaryGrid');
  const badge = document.getElementById('summaryBadge');

  if (!rows.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:24px;font-size:12px;color:var(--text-dim);">Нет данных — загрузите первый анализ</div>';
    badge.textContent = 'Нет данных';
    badge.className = 'card-badge badge-neutral';
    return;
  }

  // Собираем все показатели из всех анализов, берём последнее значение каждого
  const indicatorMap = new Map();
  for (const row of [...rows].reverse()) {
    const parsed = parseResultLines(row.result || '');
    for (const ind of parsed) {
      indicatorMap.set(ind.name.toLowerCase(), ind);
    }
  }

  const indicators = Array.from(indicatorMap.values()).slice(0, 9);
  let alertCount = 0;

  if (!indicators.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:24px;font-size:12px;color:var(--text-dim);">Показатели не распознаны</div>';
    badge.textContent = '—';
    badge.className = 'card-badge badge-neutral';
    return;
  }

  grid.innerHTML = indicators.map(ind => {
    let cls = 'ok', statusText = '✓ норма';
    if (ind.status.includes('выше')) { cls = 'warn'; statusText = '↑ выше нормы'; alertCount++; }
    if (ind.status.includes('ниже')) { cls = 'warn'; statusText = '↓ ниже нормы'; alertCount++; }
    return `
      <div class="summary-item ${cls}">
        <div class="summary-item-name">${escHtml(ind.name)}</div>
        <div class="summary-item-val">${escHtml(ind.value)}</div>
        <div class="summary-item-status ${cls}">${statusText}</div>
      </div>`;
  }).join('');

  if (alertCount === 0) {
    badge.textContent = 'Всё в норме';
    badge.className = 'card-badge badge-ok';
  } else {
    badge.textContent = alertCount + ' ' + plural(alertCount, 'отклонение', 'отклонения', 'отклонений');
    badge.className = 'card-badge badge-warn';
  }
}

// ─── Рендерим список анализов ───
function renderAnalysesList(rows) {
  const list = document.getElementById('analysesList');
  const badge = document.getElementById('analysesBadge');

  badge.textContent = rows.length + ' ' + plural(rows.length, 'файл', 'файла', 'файлов');

  if (!rows.length) {
    list.innerHTML = '<div class="analyses-empty">Анализов пока нет — <a href="upload.html" style="color:var(--orange)">загрузите первый</a></div>';
    return;
  }

  list.innerHTML = rows.map((row, i) => {
    const date = new Date(row.created_at).toLocaleDateString('ru-RU', { day: '2-digit', month: 'long', year: 'numeric' });
    const alerts = parseResultLines(row.result || '').filter(x => x.status !== 'норма').length;
    let statusHtml = alerts > 0
      ? `<span class="analysis-status badge-warn">${alerts} откл.</span>`
      : `<span class="analysis-status badge-ok">норма</span>`;

    return `
      <div class="analysis-row" data-index="${i}" style="cursor:pointer;" onclick="showResult(${i})">
        <div class="analysis-icon">
          <svg viewBox="0 0 24 24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <div class="analysis-info">
          <div class="analysis-name">${escHtml(row.filename || '—')}</div>
          <div class="analysis-meta">${date} · Возраст: ${escHtml(row.age)} · ${escHtml(row.gender)}</div>
        </div>
        ${statusHtml}
        <div class="analysis-arrow"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></div>
      </div>`;
  }).join('');
}

// ─── Показать результат конкретного анализа ───
let allRows = [];
window.showResult = function(index) {
  const row = allRows[index];
  if (!row) return;

  const card = document.getElementById('lastResultCard');
  const content = document.getElementById('lastResultContent');
  const badge = document.getElementById('lastResultBadge');

  card.style.display = '';
  badge.textContent = escHtml(row.filename || '—');

  let html = (row.result || '')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^#{1,3} (.+)$/gm, '<h3 style="font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--line);">$1</h3>')
    .replace(/норма/gi, '<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(0,200,100,0.1);color:#3DCC7A;font-size:10px;font-weight:700;padding:2px 6px;text-transform:uppercase;">✓ норма</span>')
    .replace(/выше нормы/gi, '<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(255,60,60,0.1);color:#FF5555;font-size:10px;font-weight:700;padding:2px 6px;text-transform:uppercase;">↑ выше нормы</span>')
    .replace(/ниже нормы/gi, '<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(255,200,0,0.1);color:#C89000;font-size:10px;font-weight:700;padding:2px 6px;text-transform:uppercase;">↓ ниже нормы</span>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');

  content.innerHTML = '<p>' + html + '</p>';
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
};

// ─── Загрузить пользователя ───
async function loadUser() {
  const session = await requireAuth();
  if (!session) return null;
  const email = session.user.email || '';
  document.querySelector('.user-avatar').textContent = email.slice(0, 2).toUpperCase();
  const nameEl = document.querySelector('.user-badge span');
  if (nameEl) nameEl.textContent = email;
  return session;
}

// ─── Загрузить историю ───
async function loadHistory(session) {
  try {
    const response = await fetch(`${API_BASE}/history`, {
      headers: { 'Authorization': `Bearer ${session.access_token}` },
    });
    if (response.status === 401) { window.location.href = 'auth.html'; return; }
    if (!response.ok) return;

    const data = await response.json();
    const rows = data.history || [];

    // Сортируем по дате — новые сверху, дедублицируем по filename
    const deduped = deduplicateByFilename(rows);
    allRows = deduped;

    // Обновляем метку последнего анализа
    if (deduped.length) {
      const last = deduped[0];
      const lastDate = new Date(last.created_at).toLocaleDateString('ru-RU');
      document.getElementById('lastAnalysisLabel').textContent =
        `Последний: ${escHtml(last.filename || '—')} от ${lastDate}`;
    } else {
      document.getElementById('lastAnalysisLabel').textContent = 'Анализов пока нет';
    }

    renderSummary(deduped);
    renderAnalysesList(deduped);

    // Автоматически показываем последний результат
    if (deduped.length) showResult(0);

  } catch (e) {
    console.error('Ошибка загрузки истории:', e);
  }
}

// ─── Кнопка выхода ───
document.getElementById('logoutBtn')?.addEventListener('click', async (e) => {
  e.preventDefault();
  await signOut();
});

// ─── Инициализация ───
(async () => {
  const session = await loadUser();
  if (session) await loadHistory(session);
})();
</script>
